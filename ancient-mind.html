<!DOCTYPE html>

<head>

    <title>魏晋南北朝文学 · 思维导图（内容可折叠）</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', Roboto, system-ui, sans-serif;
            background: #f7f5f2;
            color: #2c2c2c;
            padding: 16px;
        }

        .app {
            max-width: 1200px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
            padding: 24px 28px 40px;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            padding-bottom: 16px;
            border-bottom: 1px solid #eae6e0;
            margin-bottom: 20px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            color: #5f4d3b;
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            padding: 4px 10px;
            border-radius: 20px;
            background: #f0ebe4;
            transition: background 0.15s;
            border: 1px solid transparent;
        }
        .back-btn:hover {
            background: #e3dad0;
            border-color: #d6cbbc;
        }

        .header-left h1 {
            font-size: 22px;
            font-weight: 600;
            color: #3d332a;
            letter-spacing: 0.5px;
        }

        .header-left .badge {
            background: #ede8e0;
            color: #5f4d3b;
            font-size: 12px;
            padding: 2px 12px;
            border-radius: 20px;
            font-weight: 500;
        }

        .header-stats {
            display: flex;
            align-items: center;
            gap: 14px;
            font-size: 14px;
            color: #5f4d3b;
        }

        .header-stats span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .header-stats .num {
            font-weight: 700;
            color: #3d332a;
        }

        .btn-fav-filter {
            background: none;
            border: 1px solid #d6cbbc;
            border-radius: 20px;
            padding: 4px 16px;
            font-size: 13px;
            font-weight: 500;
            color: #5f4d3b;
            cursor: pointer;
            transition: all 0.15s;
            background: transparent;
        }

        .btn-fav-filter:hover {
            background: #ede8e0;
        }
        .btn-fav-filter.active {
            background: #dacfc2;
            border-color: #b5987c;
        }

        .tree-container {
            padding: 4px 0;
            font-size: 15px;
            line-height: 1.6;
        }

        .tree-node {
            position: relative;
            padding-left: 24px;
            margin-bottom: 1px;
        }
        .tree-node.level-0 { padding-left: 0; }
        .tree-node.level-1 { padding-left: 16px; }
        .tree-node.level-2 { padding-left: 32px; }
        .tree-node.level-3 { padding-left: 48px; }
        .tree-node.level-4 { padding-left: 64px; }
        .tree-node.level-5 { padding-left: 80px; }
        .tree-node.level-6 { padding-left: 96px; }

        .node-row {
            display: flex;
            align-items: flex-start;
            gap: 6px;
            padding: 4px 8px 4px 4px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.1s;
            min-height: 32px;
        }
        .node-row:hover {
            background: #f5f2ed;
        }
        .node-row.fav {
            background: #faf6ef;
        }

        .toggle-icon {
            flex-shrink: 0;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            color: #b0987e;
            margin-top: 2px;
            user-select: none;
        }
        .toggle-icon.has-children {
            color: #7a604a;
            cursor: pointer;
        }
        .toggle-icon.no-children {
            opacity: 0.3;
            cursor: default;
        }

        .node-label {
            flex: 1;
            font-weight: 500;
            color: #3d332a;
            padding: 1px 0;
            font-size: 15px;
            cursor: default;
        }
        .node-label.has-content {
            cursor: pointer;
        }
        .node-label.has-content:hover {
            color: #7a604a;
        }
        .content-toggle-indicator {
            font-size: 12px;
            color: #b0987e;
            margin-left: 6px;
            user-select: none;
        }

            flex-shrink: 0;
            width: 26px;
            height: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 17px;
            color: #d6cbbc;
            background: transparent;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: color 0.15s;
            line-height: 1;

        .star-btn:hover {
            color: #c4a88a;
        }
        .star-btn.active {
            color: #f5b342;
        }

        .node-content {
            padding: 6px 12px 8px 28px;
            font-size: 14px;
            color: #4a3f34;
            line-height: 1.8;
            background: #fcfaf7;
            border-radius: 8px;
            margin: 2px 0 6px 0;
            border-left: 2px solid #e0d6ca;
            white-space: pre-wrap;
            word-break: break-word;

            display: none;

        .node-content .poem-body {
            font-family: 'Georgia', 'STSong', serif;
            color: #3f352c;
            line-height: 2;
            letter-spacing: 0.2px;

        .children-container {
            display: block;
            padding-left: 0;
            margin-top: 1px;
        }

        .fav-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.2);

        .fav-panel {
            background: #ffffff;
            border-radius: 20px;
            max-width: 600px;
            width: 92%;
            max-height: 80vh;
            padding: 24px 28px 28px;

            font-weight: 600;
            color: #3d332a;
            margin-bottom: 14px;

            align-items: center;

            border: none;
            font-size: 22px;
            color: #b0987e;
            cursor: pointer;

        .fav-item {
            padding: 8px 12px;
            border-bottom: 1px solid #ede8e0;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            color: #3d332a;
            cursor: pointer;
        }
        .fav-item:hover { background: #f7f4ef; }
        .fav-item:last-child { border-bottom: none; }
        .fav-item .fav-icon { color: #f5b342; font-size: 16px; }
        .fav-item .fav-path {
            font-size: 12px;
            color: #b0987e;
            margin-left: auto;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;

        }
        .fav-empty {
            text-align: center;
            color: #b0987e;
            padding: 30px 0;
            font-size: 14px;
        }

        @media (max-width: 700px) {
            .app { padding: 16px; }
            .header { flex-direction: column; align-items: stretch; gap: 8px; }
            .header-left { flex-wrap: wrap; }
            .header-left h1 { font-size: 18px; }
            .header-stats { flex-wrap: wrap; font-size: 13px; gap: 8px; }
            .tree-node.level-2 { padding-left: 16px; }
            .tree-node.level-3 { padding-left: 28px; }
            .tree-node.level-4 { padding-left: 40px; }
            .tree-node.level-5 { padding-left: 52px; }
            .tree-node.level-6 { padding-left: 64px; }
            .node-content { padding: 4px 8px 6px 16px; font-size: 13px; }
            .node-row { padding: 3px 4px; min-height: 28px; }
            .node-label { font-size: 14px; }
            .fav-panel { padding: 18px; }
        }
        @media (max-width: 480px) {
            .tree-node.level-2 { padding-left: 10px; }
            .tree-node.level-3 { padding-left: 18px; }
            .tree-node.level-4 { padding-left: 26px; }
            .tree-node.level-5 { padding-left: 34px; }
            .tree-node.level-6 { padding-left: 42px; }
            .node-content { font-size: 12px; padding: 4px 6px 6px 12px; }
        }
    </style>
</head>

<script>
    // ================================================================
    // 1. 数据（完全覆盖文档所有知识点，每个叶子节点均有详细内容）
    // ================================================================
    const treeData = {
        id: 'root',
        label: '魏晋南北朝文学背诵 · 完整版',
        children: [{
            id: 'poems',
            label: '📖 一、必背诗歌完整版',
            children: [
                { id: 'p1', label: '曹操《薤露行》', content: `惟汉廿二世，所任诚不良。\n沐猴而冠带，知小而谋强。\n犹豫不敢断，因狩执君王。\n白虹为贯日，己亦先受殃。\n贼臣持国柄，杀主灭宇京。\n荡覆帝基业，宗庙以燔丧。\n播越西迁移，号泣而且行。\n瞻彼洛城郭，微子为哀伤。`, isPoem: true },
                { id: 'p2', label: '曹丕《燕歌行·其一》', content: `秋风萧瑟天气凉，草木摇落露为霜。\n群燕辞归鹄南翔，念君客游思断肠。\n慊慊思归恋故乡，君何淹留寄他方？\n贱妾茕茕守空房，忧来思君不敢忘，不觉泪下沾衣裳。\n援琴鸣弦发清商，短歌微吟不能长。\n明月皎皎照我床，星汉西流夜未央。\n牵牛织女遥相望，尔独何辜限河梁。`, isPoem: true },
                { id: 'p3', label: '王粲《七哀诗·其二》', content: `荆蛮非我乡，何为久滞淫。\n方舟泝大江，日暮愁我心。\n山冈有余映，岩阿增重阴。\n狐狸驰赴穴，飞鸟翔故林。\n流波激清响，猴猿临岸吟。\n迅风拂裳袂，白露沾衣襟。\n独夜不能寐，摄衣起抚琴。\n丝桐感人情，为我发悲音。\n羁旅无终极，忧思壮难任。`, isPoem: true },
                { id: 'p4', label: '阮籍《咏怀诗·其三》', content: `嘉树下成蹊，东园桃与李。\n秋风吹飞藿，零落从此始。\n繁华有憔悴，堂上生荆杞。\n驱马舍之去，去上西山趾。\n一身不自保，何况恋妻子。\n凝霜被野草，岁暮亦云已。`, isPoem: true },
                { id: 'p5', label: '嵇康《赠秀才入军·其十四》', content: `息徒兰圃，秣马华山。\n流磻平皋，垂纶长川。\n目送归鸿，手挥五弦。\n俯仰自得，游心太玄。\n嘉彼钓叟，得鱼忘筌。\n郢人逝矣，谁与尽言。`, isPoem: true },
                { id: 'p6', label: '陆机《赴洛道中作·其二》', content: `远游越山川，山川修且广。\n振策陟崇丘，安辔遵平莽。\n夕息抱影寐，朝徂衔思往。\n顿辔倚嵩岩，侧听悲风响。\n清露坠素辉，明月一何朗。\n抚枕不能寐，振衣独长想。`, isPoem: true },
                { id: 'p7', label: '左思《咏史诗·其一》', content: `弱冠弄柔翰，卓荦观群书。\n著论准《过秦》，作赋拟《子虚》。\n边城苦鸣镝，羽檄飞京都。\n虽非甲胄士，畴昔览《穰苴》。\n长啸激清风，志若无东吴。\n铅刀贵一割，梦想骋良图。\n左眄澄江湘，右盻定羌胡。\n功成不受爵，长揖归田庐。`, isPoem: true },
                { id: 'p8', label: '谢灵运《登池上楼》', content: `潜虬媚幽姿，飞鸿响远音。\n薄霄愧云浮，栖川怍渊沉。\n进德智所拙，退耕力不任。\n徇禄反穷海，卧疴对空林。\n衾枕昧节候，褰开暂窥临。\n倾耳聆波澜，举目眺岖嵚。\n初景革绪风，新阳改故阴。\n池塘生春草，园柳变鸣禽。\n祁祁伤豳歌，萋萋感楚吟。\n索居易永久，离群难处心。\n持操岂独古，无闷征在今。`, isPoem: true }
            ]
        }, {
            id: 'bg',
            label: '🏛️ 二、时代背景与制度文化',
            children: [{
                id: 'bg1',
                label: '政权发展脉络',
                content: `• 曹魏 (220-265)：建安、正始文学；司马氏高平陵之变，政治高压。\n• 西晋 (265-316)：太康文学兴盛，八王之乱、永嘉之乱。\n• 东晋 (317-420)：门阀政治鼎盛，"王与马共天下"，玄言诗主流。\n• 刘宋 (420-479)：元嘉三大家登场，山水诗兴起，诗风重大转折。\n• 南北朝：北朝（北魏、北齐、北周）；南朝（宋、齐、梁、陈）。`
            }, {
                id: 'bg2',
                label: '九品中正制',
                content: `• 创立：曹丕时期设立，各州郡设中正官评定士人等级。\n• 社会特权：士族垄断政治、经济、教育、司法资源。\n• 直接后果："上品无寒门，下品无势族"，寒门士子受压，催生左思、鲍照不平诗作。`
            }, {
                id: 'bg3',
                label: '思想文化环境',
                children: [{
                    id: 'bg3a',
                    label: '儒、玄、佛三教并行',
                    content: `• 刘宋元嘉十五年设四学：儒学、玄学、史学、文学。\n• 玄学以老庄为核心，清谈成风，催生玄言诗。\n• 佛教广泛传播，佛理融入诗文创作。`
                }, {
                    id: 'bg3b',
                    label: '士族状态',
                    content: `门第尊贵但实权逐步衰落，士人避祸隐逸，寄情山水、玄理。`
                }, {
                    id: 'bg3c',
                    label: '文学独立',
                    content: `文学脱离经学束缚，形成独立审美价值，刘勰《文心雕龙》系统总结六朝文学。`
                }, {
                    id: 'bg3d',
                    label: '佛教发展',
                    content: `佛理与玄学思想高度契合；释道安提出"依国主立法事"，依附皇权发展。`
                }]
            }, {
                id: 'bg4',
                label: '五言诗兴盛原因',
                content: `• 形式优势：五言容量更大、节奏灵活，束缚少于四言；四言庙堂庄重，五言通俗自由。\n• 思想背景：乱世生命意识觉醒，适合书写羁旅、伤时、隐逸、怀才不遇。\n• 创作积累：建安文人开拓五言题材与写法，后世持续发展完善。`
            }]
        }, {
            id: 'periods',
            label: '📚 三、文学分期·流派·名词解释',
            children: [{
                id: 'per1',
                label: '建安文学（汉末建安）',
                children: [{
                    id: 'per1a',
                    label: '建安风骨',
                    content: `内涵：作品直面战乱现实，书写百姓苦难、士人建功立业理想；整体风格慷慨悲凉、刚健有力，梗概多气。`
                }, {
                    id: 'per1b',
                    label: '代表作家',
                    children: [
                        { id: 'per1b1', label: '曹操', content: `诗风古直悲凉，乐府诗记录汉末战乱，被称作"汉末实录"；四言诗成就极高。` },
                        { id: 'per1b2', label: '曹丕', content: `《燕歌行》现存最早完整七言诗作，思妇怀远主题；《典论·论文》中国最早文论专篇，提出"诗赋欲丽"。` },
                        { id: 'per1b3', label: '曹植', content: `建安文学最高成就者。善用比兴，融叙事、抒情、说理、写景于一体；代表作《白马篇》《赠白马王彪》；开拓游侠、都市、弃妇等题材。` },
                        { id: 'per1b4', label: '王粲（建安七子之首）', content: `《七哀诗》书写乱世流离、民生苦难，以小场景折射时代浩劫。` },
                        { id: 'per1b5', label: '刘桢', content: `诗歌以"气"见长，刚健质朴，代表作《赠从弟》。` }
                    ]
                }]
            }, {
                id: 'per2',
                label: '正始文学（240-265）',
                children: [{
                    id: 'per2a',
                    label: '时代背景',
                    content: `司马氏谋划篡魏，政治恐怖，文人不敢直陈时事，清谈取代清议。`
                }, {
                    id: 'per2b',
                    label: '文风转变',
                    content: `建安直写时事、爽朗慷慨 → 正始隐晦讽喻、寓理于象、清峻幽深。`
                }, {
                    id: 'per2c',
                    label: '竹林七贤',
                    content: `阮籍、嵇康、山涛、向秀、阮咸、王戎、刘伶。`
                }, {
                    id: 'per2d',
                    label: '阮籍',
                    content: `代表作《咏怀诗》八十二首，开创五言组诗范式。\n艺术特点：象征、神话、比兴，文意幽深，"言在耳目之内，情寄八荒之表"；主题含盛衰兴亡、忧生之叹、进退两难。\n影响：陈子昂《感遇》、李白《古风》、张九龄《感遇》均承其托喻抒情。`
                }, {
                    id: 'per2e',
                    label: '嵇康',
                    content: `散文《与山巨源绝交书》，反抗虚伪名教；临刑弹《广陵散》。\n诗歌清远高逸，代表作《赠秀才入军·其十四》。崇尚自然，蔑视礼法权贵。`
                }]
            }, {
                id: 'per3',
                label: '西晋太康文学',
                children: [{

    // ================================================================
    // 2. 状态管理
    // ================================================================
    const state = {
        expanded: new Set(),          // 子节点展开状态
        contentExpanded: new Set(),   // 内容展开状态（有内容的节点）
        favorites: new Set(),
        filterFavOnly: false,
        nodeMap: new Map(),
    };

    function buildMap(node, parent) {
        node.parent = parent || null;
        state.nodeMap.set(node.id, node);
        if (node.children) {
            node.children.forEach(child => buildMap(child, node));
        }
    }
    buildMap(treeData);

    // 默认全部展开（子节点和内容）
    for (let id of state.nodeMap.keys()) {
        state.expanded.add(id);
        if (state.nodeMap.get(id).content) {
            state.contentExpanded.add(id);
        }
    }

    // ================================================================
    // 3. 渲染引擎
    // ================================================================
    function render() {
        const container = document.getElementById('treeContainer');
        container.innerHTML = '';
        renderNode(treeData, container, 0);
        updateStats();
        applyFavFilter();
    }

    function renderNode(node, parentEl, level) {
        const isExpanded = state.expanded.has(node.id);
        const isContentExpanded = state.contentExpanded.has(node.id);
        const isFav = state.favorites.has(node.id);
        const hasChildren = node.children && node.children.length > 0;
        const hasContent = !!node.content;

        const wrapper = document.createElement('div');
        wrapper.className = `tree-node level-${Math.min(level, 6)}`;
        wrapper.dataset.nodeId = node.id;

        // 行
        const row = document.createElement('div');
        row.className = `node-row${isFav ? ' fav' : ''}`;

        // 子节点折叠图标
        const toggle = document.createElement('span');
        toggle.className = `toggle-icon${hasChildren ? ' has-children' : ' no-children'}`;
        toggle.textContent = hasChildren ? (isExpanded ? '▾' : '▸') : '·';
        if (hasChildren) {
            toggle.addEventListener('click', (e) => {
                e.stopPropagation();
                toggleNode(node.id);
            });
        }
        row.appendChild(toggle);

        // 标签（点击切换内容折叠）
        const label = document.createElement('span');
        label.className = `node-label${hasContent ? ' has-content' : ''}`;
        label.textContent = node.label;
        if (hasContent) {
            label.addEventListener('click', (e) => {
                e.stopPropagation();
                toggleContent(node.id);
            });
            // 添加一个小指示符
            const indicator = document.createElement('span');
            indicator.className = 'content-toggle-indicator';
            indicator.textContent = isContentExpanded ? ' ▾' : ' ▸';
            label.appendChild(indicator);
        }
        row.appendChild(label);

        // 收藏星标
        const star = document.createElement('button');
        star.className = `star-btn${isFav ? ' active' : ''}`;
        star.textContent = isFav ? '★' : '☆';
        star.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleFav(node.id);
        });
        row.appendChild(star);

        // 行点击：切换子节点展开（保留原功能）
        row.addEventListener('click', () => {
            if (hasChildren) toggleNode(node.id);
        });

        wrapper.appendChild(row);

        // 内容块
        if (hasContent) {
            const contentDiv = document.createElement('div');
            contentDiv.className = `node-content${isContentExpanded ? '' : ' content-hidden'}`;
            if (node.isPoem) {
                const lines = node.content.split('\n').filter(l => l.trim());
                const body = document.createElement('div');
                body.className = 'poem-body';
                lines.forEach(line => {
                    const span = document.createElement('span');
                    span.className = 'line';
                    span.textContent = line;
                    body.appendChild(span);
                });
                contentDiv.appendChild(body);
            } else {
                contentDiv.textContent = node.content;
            }
            wrapper.appendChild(contentDiv);
        }

        // 子节点
        if (hasChildren) {
            const childrenContainer = document.createElement('div');
            childrenContainer.className = 'children-container';
            node.children.forEach(child => {
                renderNode(child, childrenContainer, level + 1);
            });
            wrapper.appendChild(childrenContainer);
        }

        parentEl.appendChild(wrapper);
    }

    // ================================================================
    // 4. 交互函数
    // ================================================================
    function toggleNode(id) {
        if (state.expanded.has(id)) {
            state.expanded.delete(id);
        } else {
            state.expanded.add(id);
        }
        render();
    }

    function toggleContent(id) {
        if (state.contentExpanded.has(id)) {
            state.contentExpanded.delete(id);
        } else {
            state.contentExpanded.add(id);
        }
        render();
    }

    function toggleFav(id) {
        if (state.favorites.has(id)) {
            state.favorites.delete(id);
        } else {
            state.favorites.add(id);
        }
        render();
    }

    function toggleFavFilter() {
        state.filterFavOnly = !state.filterFavOnly;
        document.getElementById('favFilterBtn').classList.toggle('active');
        applyFavFilter();
        updateStats();
    }

    function applyFavFilter() {
        const nodes = document.querySelectorAll('.tree-node');
        if (!state.filterFavOnly) {
            nodes.forEach(el => el.style.display = '');
            return;
        }
        const favIds = new Set(state.favorites);
        const visible = new Set();
        nodes.forEach(el => {
            const id = el.dataset.nodeId;
            if (id && favIds.has(id)) {
                let cur = state.nodeMap.get(id);
                while (cur) {
                    visible.add(cur.id);
                    cur = cur.parent;
                }
            }
        });
        nodes.forEach(el => {
            const id = el.dataset.nodeId;
            el.style.display = (id && visible.has(id)) ? '' : 'none';
        });
    }

    function updateStats() {
        document.getElementById('totalNodes').textContent = state.nodeMap.size;
        document.getElementById('favCount').textContent = state.favorites.size;
    }

    // ================================================================
    // 5. 收藏列表浮层
    // ================================================================
    function showFavList() {
        const overlay = document.getElementById('favOverlay');
        const list = document.getElementById('favList');
        list.innerHTML = '';
        if (state.favorites.size === 0) {
            list.innerHTML = '<div class="fav-empty">还没有收藏任何知识点 ✨</div>';
        } else {
            const sorted = Array.from(state.favorites);
            sorted.forEach(id => {
                const node = state.nodeMap.get(id);
                if (!node) return;
                const item = document.createElement('div');
                item.className = 'fav-item';
                item.innerHTML = `
                    <span class="fav-icon">⭐</span>
                    <span>${node.label}</span>
                    <span class="fav-path">${getPath(node)}</span>
                `;
                item.addEventListener('click', () => {
                    overlay.classList.remove('open');
                    // 展开所有祖先
                    let cur = node.parent;
                    while (cur) {
                        state.expanded.add(cur.id);
                        cur = cur.parent;
                    }
                    state.expanded.add(node.id);
                    // 同时展开该节点的内容
                    if (node.content) state.contentExpanded.add(node.id);
                    render();
                    setTimeout(() => {
                        const target = document.querySelector(`.tree-node[data-node-id="${node.id}"]`);
                        if (target) target.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }, 100);
                });
                list.appendChild(item);
            });
        }
        overlay.classList.add('open');
    }

    function getPath(node) {
        const parts = [];
        let cur = node.parent;
        while (cur && cur.id !== 'root') {
            parts.unshift(cur.label);
            cur = cur.parent;
        }
        return parts.join(' › ');
    }

    // ================================================================
    // 6. 事件绑定 & 启动
    // ================================================================
    document.addEventListener('DOMContentLoaded', () => {
        render();
        document.getElementById('favFilterBtn').addEventListener('click', toggleFavFilter);
        document.getElementById('showFavBtn').addEventListener('click', showFavList);
        document.getElementById('closeFavPanel').addEventListener('click', () => {
            document.getElementById('favOverlay').classList.remove('open');
        });
        document.getElementById('favOverlay').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) {
                document.getElementById('favOverlay').classList.remove('open');
            }
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                document.getElementById('favOverlay').classList.remove('open');
            }
        });
    });
</script>
</body>
</html>
