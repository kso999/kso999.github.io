<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学习导航页</title>
    <style>
        :root {
            --bg: #f0f4f8;
            --card-mindmap: #4f46e5;
            --card-mindmap-light: #eef2ff;
            --card-mindmap-gradient: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            --card-recite: #0891b2;
            --card-recite-light: #ecfeff;
            --card-recite-gradient: linear-gradient(135deg, #0891b2 0%, #06b6d4 100%);
            --card-quiz: #ea580c;
            --card-quiz-light: #fff7ed;
            --card-quiz-gradient: linear-gradient(135deg, #ea580c 0%, #f97316 100%);
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 20px rgba(0, 0, 0, 0.08), 0 2px 6px rgba(0, 0, 0, 0.04);
            --shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.12), 0 4px 12px rgba(0, 0, 0, 0.06);
            --shadow-xl: 0 20px 60px rgba(0, 0, 0, 0.15), 0 8px 20px rgba(0, 0, 0, 0.08);
            --radius-sm: 12px;
            --radius-md: 18px;
            --radius-lg: 24px;
            --radius-xl: 28px;
            --transition-smooth: cubic-bezier(0.34, 1.56, 0.64, 1);
            --transition-spring: cubic-bezier(0.22, 1.25, 0.36, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', system-ui, -apple-system, sans-serif;
            background: #e8eef5;
            background-image:
                radial-gradient(ellipse at 15% 20%, rgba(79, 70, 229, 0.06) 0%, transparent 55%),
                radial-gradient(ellipse at 85% 75%, rgba(234, 88, 12, 0.05) 0%, transparent 55%),
                radial-gradient(ellipse at 50% 50%, rgba(8, 145, 178, 0.04) 0%, transparent 60%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        /* ============ 主容器 ============ */
        .nav-container {
            width: 100%;
            max-width: 1050px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 32px;
        }

        /* ============ 标题区域 ============ */
        .header {
            text-align: center;
            animation: fadeInDown 0.7s ease forwards;
        }
        .header .icon-row {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
        }
        .header .dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            display: inline-block;
            animation: pulse-dot 2s ease-in-out infinite;
        }
        .header .dot:nth-child(1) {
            background: #4f46e5;
            animation-delay: 0s;
        }
        .header .dot:nth-child(2) {
            background: #0891b2;
            animation-delay: 0.3s;
        }
        .header .dot:nth-child(3) {
            background: #ea580c;
            animation-delay: 0.6s;
        }
        .header h1 {
            font-size: clamp(1.6rem, 3.5vw, 2.2rem);
            font-weight: 700;
            color: #1e293b;
            letter-spacing: -0.02em;
        }
        .header .subtitle {
            font-size: 0.95rem;
            color: #64748b;
            font-weight: 400;
            letter-spacing: 0.04em;
        }

        @keyframes pulse-dot {
            0%,
            100% {
                transform: scale(1);
                opacity: 0.7;
            }
            50% {
                transform: scale(1.9);
                opacity: 1;
            }
        }
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-24px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ============ 卡片网格 ============ */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 22px;
            width: 100%;
            animation: fadeInUp 0.7s ease forwards;
            animation-delay: 0.15s;
            opacity: 0;
            animation-fill-mode: forwards;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ============ 单个主卡片 ============ */
        .main-card {
            position: relative;
            background: #ffffff;
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-md);
            cursor: pointer;
            transition: all 0.45s var(--transition-smooth);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 38px 24px 32px;
            gap: 14px;
            z-index: 1;
            border: 1.5px solid transparent;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }
        .main-card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-xl);
            border-color: rgba(0, 0, 0, 0.06);
        }
        .main-card:active {
            transform: scale(0.97);
            transition: transform 0.15s ease;
        }
        .main-card.expanded {
            z-index: 10;
            border-color: rgba(0, 0, 0, 0.08);
            box-shadow: var(--shadow-xl);
        }

        /* 顶部色条 */
        .main-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
        }
        .main-card.card-mindmap::before {
            background: var(--card-mindmap-gradient);
        }
        .main-card.card-recite::before {
            background: var(--card-recite-gradient);
        }
        .main-card.card-quiz::before {
            background: var(--card-quiz-gradient);
        }

        /* 图标圆圈 */
        .card-icon-circle {
            width: 68px;
            height: 68px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            transition: all 0.4s var(--transition-smooth);
            position: relative;
            z-index: 1;
            flex-shrink: 0;
        }
        .card-mindmap .card-icon-circle {
            background: var(--card-mindmap-light);
            color: #4f46e5;
        }
        .card-recite .card-icon-circle {
            background: var(--card-recite-light);
            color: #0891b2;
        }
        .card-quiz .card-icon-circle {
            background: var(--card-quiz-light);
            color: #ea580c;
        }
        .main-card:hover .card-icon-circle {
            transform: scale(1.08);
        }

        /* 卡片文字 */
        .card-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #1e293b;
            letter-spacing: -0.01em;
            transition: color 0.3s;
            position: relative;
            z-index: 1;
        }
        .card-hint {
            font-size: 0.8rem;
            color: #94a3b8;
            font-weight: 500;
            letter-spacing: 0.03em;
            transition: all 0.3s;
            position: relative;
            z-index: 1;
        }
        .main-card.expanded .card-hint {
            opacity: 0;
            transform: translateY(-6px);
            pointer-events: none;
        }

        /* 展开箭头 */
        .expand-arrow {
            position: absolute;
            bottom: 16px;
            font-size: 0.75rem;
            color: #cbd5e1;
            transition: all 0.4s var(--transition-smooth);
            z-index: 1;
            pointer-events: none;
        }
        .main-card.expanded .expand-arrow {
            transform: rotate(180deg);
            color: #94a3b8;
        }
        .main-card:hover .expand-arrow {
            color: #94a3b8;
        }

        /* ============ 子菜单容器 ============ */
        .submenu-wrapper {
            width: 100%;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.55s var(--transition-spring), margin-top 0.4s var(--transition-smooth), opacity 0.35s ease;
            opacity: 0;
            margin-top: 0;
            position: relative;
            z-index: 2;
        }
        .main-card.expanded .submenu-wrapper {
            max-height: 220px;
            margin-top: 8px;
            opacity: 1;
        }

        /* 子菜单列表 */
        .submenu-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 0 4px;
        }
        .submenu-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            position: relative;
            color: #475569;
            background: #f8fafc;
            letter-spacing: 0.01em;
            text-decoration: none;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }
        .submenu-item:hover {
            background: #f1f5f9;
            transform: translateX(4px);
            color: #1e293b;
        }
        .submenu-item:active {
            transform: scale(0.96);
            transition: transform 0.12s ease;
            background: #e2e8f0;
        }
        .submenu-item .sub-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
            transition: transform 0.3s var(--transition-smooth);
        }
        .submenu-item:hover .sub-dot {
            transform: scale(1.6);
        }
        .card-mindmap .submenu-item .sub-dot {
            background: #4f46e5;
        }
        .card-recite .submenu-item .sub-dot {
            background: #0891b2;
        }
        .card-quiz .submenu-item .sub-dot {
            background: #ea580c;
        }
        .submenu-item .sub-arrow {
            margin-left: auto;
            font-size: 0.7rem;
            color: #cbd5e1;
            transition: all 0.3s;
        }
        .submenu-item:hover .sub-arrow {
            color: #64748b;
            transform: translateX(3px);
        }

        /* ============ 涟漪效果 ============ */
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.08);
            transform: scale(0);
            animation: ripple-anim 0.7s ease-out forwards;
            pointer-events: none;
        }
        @keyframes ripple-anim {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        /* ============ Toast 提示 ============ */
        .toast {
            position: fixed;
            top: 28px;
            left: 50%;
            transform: translateX(-50%) translateY(-120px);
            background: #1e293b;
            color: #fff;
            padding: 12px 28px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            z-index: 999;
            pointer-events: none;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.45s var(--transition-spring);
            white-space: nowrap;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
        .toast .toast-emoji {
            margin-right: 6px;
        }

        /* ============ 响应式 ============ */
        @media (max-width: 768px) {
            .cards-grid {
                grid-template-columns: 1fr;
                gap: 16px;
                max-width: 420px;
                margin: 0 auto;
            }
            .main-card {
                padding: 28px 20px 24px;
                gap: 10px;
                border-radius: var(--radius-lg);
            }
            .card-icon-circle {
                width: 56px;
                height: 56px;
                font-size: 26px;
            }
            .card-title {
                font-size: 1.15rem;
            }
            .submenu-item {
                padding: 10px 14px;
                font-size: 0.9rem;
            }
            .main-card.expanded .submenu-wrapper {
                max-height: 200px;
            }
            .expand-arrow {
                bottom: 10px;
                font-size: 0.7rem;
            }
        }
        @media (max-width: 380px) {
            .cards-grid {
                gap: 12px;
            }
            .main-card {
                padding: 22px 16px 20px;
                border-radius: var(--radius-md);
            }
            .card-icon-circle {
                width: 48px;
                height: 48px;
                font-size: 22px;
            }
            .card-title {
                font-size: 1.05rem;
            }
            .card-hint {
                font-size: 0.72rem;
            }
        }
    </style>
</head>
<body>

    <!-- Toast 提示 -->
    <div class="toast" id="toast"></div>

    <!-- 主容器 -->
    <div class="nav-container">
        <!-- 标题 -->
        <div class="header">
            <div class="icon-row">
                <span class="dot"></span><span class="dot"></span><span class="dot"></span>
            </div>
            <h1>📚 学习导航</h1>
            <p class="subtitle">点击卡片展开 · 选择学科进入</p>
        </div>

        <!-- 卡片网格 -->
        <div class="cards-grid" id="cardsGrid">
            <!-- ===== 思维导图 ===== -->
            <div class="main-card card-mindmap" data-card="mindmap" id="cardMindmap">
                <div class="card-icon-circle">🧠</div>
                <div class="card-title">思维导图</div>
                <div class="card-hint">点击展开学科</div>
                <span class="expand-arrow">▼</span>
                <!-- 子菜单 -->
                <div class="submenu-wrapper">
                    <div class="submenu-list">
                        <div class="submenu-item" data-subject="现代文学" data-parent="思维导图">
                            <span class="sub-dot"></span> 现代文学
                            <span class="sub-arrow">→</span>
                        </div>
                        <div class="submenu-item" data-subject="毛概" data-parent="思维导图">
                            <span class="sub-dot"></span> 毛概
                            <span class="sub-arrow">→</span>
                        </div>
                        <div class="submenu-item" data-subject="古代文学" data-parent="思维导图">
                            <span class="sub-dot"></span> 古代文学
                            <span class="sub-arrow">→</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ===== 背诵卡片 ===== -->
            <div class="main-card card-recite" data-card="recite" id="cardRecite">
                <div class="card-icon-circle">📝</div>
                <div class="card-title">背诵卡片</div>
                <div class="card-hint">点击展开学科</div>
                <span class="expand-arrow">▼</span>
                <!-- 子菜单 -->
                <div class="submenu-wrapper">
                    <div class="submenu-list">
                        <div class="submenu-item" data-subject="现代文学" data-parent="背诵卡片">
                            <span class="sub-dot"></span> 现代文学
                            <span class="sub-arrow">→</span>
                        </div>
                        <div class="submenu-item" data-subject="毛概" data-parent="背诵卡片">
                            <span class="sub-dot"></span> 毛概
                            <span class="sub-arrow">→</span>
                        </div>
                        <div class="submenu-item" data-subject="古代文学" data-parent="背诵卡片">
                            <span class="sub-dot"></span> 古代文学
                            <span class="sub-arrow">→</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ===== 刷题 ===== -->
            <div class="main-card card-quiz" data-card="quiz" id="cardQuiz">
                <div class="card-icon-circle">✍️</div>
                <div class="card-title">刷题</div>
                <div class="card-hint">点击展开学科</div>
                <span class="expand-arrow">▼</span>
                <!-- 子菜单 -->
                <div class="submenu-wrapper">
                    <div class="submenu-list">
                        <div class="submenu-item" data-subject="现代文学" data-parent="刷题">
                            <span class="sub-dot"></span> 现代文学
                            <span class="sub-arrow">→</span>
                        </div>
                        <div class="submenu-item" data-subject="毛概" data-parent="刷题">
                            <span class="sub-dot"></span> 毛概
                            <span class="sub-arrow">→</span>
                        </div>
                        <div class="submenu-item" data-subject="古代文学" data-parent="刷题">
                            <span class="sub-dot"></span> 古代文学
                            <span class="sub-arrow">→</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ============ DOM元素 ============
            const cardsGrid = document.getElementById('cardsGrid');
            const mainCards = document.querySelectorAll('.main-card');
            const submenuItems = document.querySelectorAll('.submenu-item');
            const toast = document.getElementById('toast');

            let expandedCard = null; // 当前展开的卡片
            let toastTimer = null;

            // ============ Toast 提示 ============
            function showToast(message, emoji = '📌') {
                if (toastTimer) clearTimeout(toastTimer);
                toast.innerHTML = `<span class="toast-emoji">${emoji}</span>${message}`;
                toast.classList.add('show');
                toastTimer = setTimeout(() => {
                    toast.classList.remove('show');
                }, 2000);
            }

            // ============ 涟漪效果 ============
            function createRipple(e, element) {
                const ripple = document.createElement('span');
                ripple.classList.add('ripple');
                const rect = element.getBoundingClientRect();
                const size = Math.max(rect.width, rect.height);
                ripple.style.width = ripple.style.height = `${size}px`;
                ripple.style.left = `${e.clientX - rect.left - size / 2}px`;
                ripple.style.top = `${e.clientY - rect.top - size / 2}px`;
                element.style.position = element.style.position || 'relative';
                element.style.overflow = 'hidden';
                element.appendChild(ripple);
                ripple.addEventListener('animationend', () => ripple.remove());
            }

            // ============ 折叠所有卡片 ============
            function collapseAll(exceptCard = null) {
                mainCards.forEach(card => {
                    if (card !== exceptCard) {
                        card.classList.remove('expanded');
                    }
                });
                if (!exceptCard) {
                    expandedCard = null;
                }
            }

            // ============ 主卡片点击：展开/折叠 ============
            mainCards.forEach(card => {
                card.addEventListener('click', function(e) {
                    // 如果点击的是子菜单项，不处理
                    if (e.target.closest('.submenu-item')) return;

                    createRipple(e, this);

                    const isCurrentlyExpanded = this.classList.contains('expanded');

                    if (isCurrentlyExpanded) {
                        // 折叠当前卡片
                        this.classList.remove('expanded');
                        expandedCard = null;
                    } else {
                        // 折叠其他，展开当前
                        collapseAll();
                        this.classList.add('expanded');
                        expandedCard = this;
                        // 滚动到视图（移动端）
                        setTimeout(() => {
                            this.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                        }, 150);
                    }
                });

                // 键盘可访问性
                card.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        this.click();
                    }
                });
                card.setAttribute('tabindex', '0');
                card.setAttribute('role', 'button');
                card.setAttribute('aria-expanded', 'false');
            });

            // ============ 监听 expanded 变化更新 aria ============
            const observer = new MutationObserver((mutations) => {
                mutations.forEach(mutation => {
                    if (mutation.type === 'attributes' && mutation.attributeName === 'class') {
                        const card = mutation.target;
                        const isExpanded = card.classList.contains('expanded');
                        card.setAttribute('aria-expanded', isExpanded ? 'true' : 'false');
                    }
                });
            });
            mainCards.forEach(card => {
                observer.observe(card, { attributes: true, attributeFilter: ['class'] });
            });

            // ============ 子菜单项点击 ============
            submenuItems.forEach(item => {
                item.addEventListener('click', function(e) {
                    e.stopPropagation(); // 阻止冒泡到主卡片
                    createRipple(e, this);

                    const subject = this.getAttribute('data-subject');
                    const parent = this.getAttribute('data-parent');

                    // 显示提示
                    const emojiMap = {
                        '思维导图': '🧠',
                        '背诵卡片': '📝',
                        '刷题': '✍️'
                    };
                    const emoji = emojiMap[parent] || '📌';
                    showToast(`正在进入：${parent} · ${subject}`, emoji);

                    // 模拟跳转（实际项目中替换为真实链接）
                    console.log(`🔗 导航到：${parent} → ${subject}`);
// 匹配页面文件名
let target = "";
if(parent === "思维导图"){
    if(subject === "现代文学") target = "modern-mind.html";
    if(subject === "古代文学") target = "ancient-mind.html";
}else if(parent === "背诵卡片"){
    if(subject === "毛概") target = "maogai-card.html";
    if(subject === "古代文学") target = "ancient-poem-card.html";
    if(subject === "现代文学") target = "modern-card.html";
}else if(parent === "刷题"){
    if(subject === "毛概") target = "maogai-quiz.html";
    if(subject === "现代文学") target = "modern-quiz.html";
    if(subject === "古代文学") target = "ancient-quiz.html";
}
// 执行页面跳转
if(target) window.location.href = target;

                    // 300ms后折叠卡片
                    setTimeout(() => {
                        collapseAll();
                    }, 400);
                });

                // 键盘可访问性
                item.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        this.click();
                    }
                });
                item.setAttribute('tabindex', '0');
                item.setAttribute('role', 'button');
            });

            // ============ 点击外部区域折叠 ============
            document.addEventListener('click', function(e) {
                if (expandedCard && !expandedCard.contains(e.target)) {
                    expandedCard.classList.remove('expanded');
                    expandedCard = null;
                }
            });

            // ============ ESC 键折叠 ============
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && expandedCard) {
                    expandedCard.classList.remove('expanded');
                    expandedCard = null;
                    expandedCard?.focus();
                }
            });

            // ============ 触摸设备：阻止子菜单点击时的双击缩放 ============
            submenuItems.forEach(item => {
                item.addEventListener('touchstart', function(e) {
                    // 不做preventDefault，保持可点击
                }, { passive: true });
            });
