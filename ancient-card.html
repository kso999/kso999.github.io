<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>魏晋南北朝 · 诗歌快闪卡片</title>
    <style>
        /* ===== 全局重置 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', 'Times New Roman', '宋体', serif;
            background: #f3efe8;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background-image: radial-gradient(ellipse at 20% 50%, rgba(200, 180, 160, 0.15) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 50%, rgba(180, 160, 140, 0.12) 0%, transparent 60%);
        }

        /* ===== 主容器 ===== */
        .app {
            width: 100%;
            max-width: 780px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        /* ===== 返回导航 ===== */
        .back-nav {
            width: 100%;
            margin-bottom: 16px;
            display: flex;
            justify-content: flex-start;
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 20px;
            background: #f5ede2;
            border: 1px solid #d4c8b8;
            border-radius: 40px;
            color: #3d2c1e;
            text-decoration: none;
            font-size: 15px;
            font-family: 'Georgia', serif;
            letter-spacing: 0.5px;
            transition: all 0.25s ease;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.02);
        }
        .back-btn:hover {
            background: #e8ddd0;
            border-color: #b8aa9a;
            box-shadow: 0 4px 12px rgba(60, 40, 30, 0.08);
            transform: translateY(-2px);
        }
        .back-btn:active {
            transform: translateY(0);
        }

        /* ===== 标题 ===== */
        .app-header {
            text-align: center;
            margin-bottom: 28px;
            width: 100%;
        }
        .app-header h1 {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: 4px;
            color: #3d2c1e;
            background: linear-gradient(135deg, #5a3f2b, #3d2c1e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .app-header .sub {
            font-size: 14px;
            color: #8a7a6a;
            letter-spacing: 2px;
            margin-top: 4px;
            border-top: 1px solid #ddd6cc;
            padding-top: 8px;
            display: inline-block;
        }
        .app-header .counter {
            font-size: 14px;
            color: #9a8a7a;
            margin-left: 12px;
            font-weight: 400;
        }

        /* ===== 卡片容器 ===== */
        .card-container {
            width: 100%;
            perspective: 1600px;
            margin-bottom: 30px;
            position: relative;
            min-height: 420px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ===== 卡片 ===== */
        .card {
            width: 100%;
            max-width: 720px;
            aspect-ratio: 5 / 3.2;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            cursor: pointer;
            border-radius: 28px;
            box-shadow: 0 20px 50px rgba(60, 40, 30, 0.20), 0 8px 20px rgba(60, 40, 30, 0.08);
            will-change: transform;
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        /* ===== 卡片面通用 ===== */
        .card-face {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: 28px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px 28px;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: box-shadow 0.3s;
        }

        /* ===== 正面 ===== */
        .card-front {
            background: linear-gradient(145deg, #fcf8f0, #f5ede2);
            z-index: 2;
            border: 1px solid #e8ddd0;
            box-shadow: inset 0 2px 4px rgba(255, 255, 255, 0.8);
        }
        .card-front .poem-title {
            font-size: 32px;
            font-weight: 700;
            color: #3d2c1e;
            letter-spacing: 3px;
            text-shadow: 0 1px 2px rgba(255, 255, 255, 0.5);
            margin-bottom: 8px;
            text-align: center;
            line-height: 1.3;
        }
        .card-front .poem-author {
            font-size: 20px;
            color: #8a7a6a;
            letter-spacing: 2px;
            border-top: 2px solid #d4c8b8;
            padding-top: 12px;
            margin-top: 4px;
            font-weight: 400;
        }
        .card-front .hint-tap {
            position: absolute;
            bottom: 22px;
            font-size: 13px;
            color: #b8aa9a;
            letter-spacing: 1px;
            background: rgba(255, 255, 255, 0.5);
            padding: 4px 18px;
            border-radius: 30px;
            backdrop-filter: blur(2px);
        }
        /* 正面装饰线 */
        .card-front::after {
            content: '◆';
            position: absolute;
            bottom: 56px;
            font-size: 12px;
            color: #d4c8b8;
            letter-spacing: 6px;
        }

        /* ===== 背面 ===== */
        .card-back {
            background: linear-gradient(160deg, #fcf8f0, #f3ede2);
            transform: rotateY(180deg);
            border: 1px solid #e0d4c4;
            box-shadow: inset 0 2px 4px rgba(255, 255, 255, 0.6);
            justify-content: flex-start;
            align-items: flex-start;
            padding: 32px 34px;
            overflow-y: auto;
        }
        .card-back .back-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            width: 100%;
            border-bottom: 2px solid #d4c8b8;
            padding-bottom: 10px;
            margin-bottom: 16px;
            flex-shrink: 0;
        }
        .card-back .back-title {
            font-size: 20px;
            font-weight: 600;
            color: #3d2c1e;
            letter-spacing: 1px;
        }
        .card-back .back-author {
            font-size: 16px;
            color: #8a7a6a;
        }
        .card-back .poem-body {
            font-size: 17px;
            line-height: 2.1;
            color: #2d241a;
            white-space: pre-line;
            width: 100%;
            font-family: 'Georgia', '宋体', serif;
            letter-spacing: 0.5px;
            flex: 1;
            overflow-y: auto;
            padding-right: 4px;
        }
        .card-back .poem-body::-webkit-scrollbar {
            width: 3px;
        }
        .card-back .poem-body::-webkit-scrollbar-thumb {
            background: #d4c8b8;
            border-radius: 10px;
        }
        .card-back .poem-body::-webkit-scrollbar-track {
            background: transparent;
        }

        /* ===== 导航栏 ===== */
        .controls {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            margin-top: 6px;
        }

        .controls button {
            background: #f5ede2;
            border: 1px solid #d4c8b8;
            border-radius: 40px;
            padding: 10px 22px;
            font-size: 15px;
            font-weight: 500;
            color: #3d2c1e;
            cursor: pointer;
            transition: all 0.25s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: 'Georgia', serif;
            letter-spacing: 0.5px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.02);
        }
        .controls button:hover:not(:disabled) {
            background: #e8ddd0;
            border-color: #b8aa9a;
            box-shadow: 0 4px 12px rgba(60, 40, 30, 0.10);
            transform: translateY(-1px);
        }
        .controls button:active:not(:disabled) {
            transform: translateY(0px);
        }
        .controls button:disabled {
            opacity: 0.35;
            cursor: not-allowed;
            transform: none;
        }

        .controls .btn-primary {
            background: #3d2c1e;
            border-color: #3d2c1e;
            color: #fcf8f0;
        }
        .controls .btn-primary:hover:not(:disabled) {
            background: #2d1e12;
            border-color: #2d1e12;
            color: #fff;
        }
        .controls .btn-fav {
            background: #f5ede2;
            border-color: #d4c8b8;
            min-width: 100px;
            justify-content: center;
        }
        .controls .btn-fav.active {
            background: #f0e4d8;
            border-color: #b8a08a;
            color: #8a3a2a;
        }
        .controls .btn-fav .fav-icon {
            font-size: 18px;
            line-height: 1;
        }

        .controls .nav-group {
            display: flex;
            gap: 6px;
        }
        .controls .nav-group button {
            padding: 10px 18px;
            min-width: 70px;
            justify-content: center;
        }

        /* ===== 页码指示 ===== */
        .dot-indicator {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 18px 0 6px;
            width: 100%;
            flex-wrap: wrap;
        }
        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #d4c8b8;
            transition: all 0.3s;
            cursor: pointer;
            border: none;
            padding: 0;
            flex-shrink: 0;
        }
        .dot.active {
            background: #3d2c1e;
            transform: scale(1.25);
            box-shadow: 0 0 0 3px rgba(61, 44, 30, 0.15);
        }
        .dot.faved {
            background: #b8a08a;
            border: 1px solid #8a7a6a;
        }
        .dot.faved.active {
            background: #3d2c1e;
            border-color: #3d2c1e;
        }

        /* ===== 收藏状态条 ===== */
        .fav-status {
            font-size: 13px;
            color: #9a8a7a;
            margin-top: 10px;
            letter-spacing: 0.5px;
            border-top: 1px solid #e8ddd0;
            padding-top: 14px;
            width: 100%;
            text-align: center;
        }
        .fav-status span {
            font-weight: 500;
            color: #5a4a3a;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 600px) {
            .app-header h1 {
                font-size: 22px;
                letter-spacing: 2px;
            }
            .card {
                aspect-ratio: 4 / 3;
                border-radius: 20px;
            }
            .card-face {
                padding: 22px 18px;
                border-radius: 20px;
            }
            .card-front .poem-title {
                font-size: 24px;
            }
            .card-front .poem-author {
                font-size: 17px;
            }
            .card-back {
                padding: 22px 20px;
            }
            .card-back .back-title {
                font-size: 17px;
            }
            .card-back .back-author {
                font-size: 14px;
            }
            .card-back .poem-body {
                font-size: 15px;
                line-height: 1.9;
            }
            .controls {
                gap: 10px;
            }
            .controls button {
                padding: 8px 14px;
                font-size: 13px;
                border-radius: 30px;
            }
            .controls .nav-group button {
                padding: 8px 12px;
                min-width: 56px;
            }
            .controls .btn-fav {
                min-width: 80px;
            }
            .dot {
                width: 8px;
                height: 8px;
            }
            .back-btn {
                font-size: 13px;
                padding: 6px 16px;
            }
        }

        @media (max-width: 400px) {
            .card-front .poem-title {
                font-size: 20px;
            }
            .card-back .poem-body {
                font-size: 13px;
                line-height: 1.8;
            }
            .controls button {
                font-size: 12px;
                padding: 6px 10px;
            }
        }

        /* ===== 滚动条美化 ===== */
        .card-back::-webkit-scrollbar {
            width: 4px;
        }
        .card-back::-webkit-scrollbar-thumb {
            background: #d4c8b8;
            border-radius: 10px;
        }
        .card-back::-webkit-scrollbar-track {
            background: transparent;
        }

        /* ===== 动画 ===== */
        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .card-container {
            animation: fadeSlideUp 0.5s ease-out;
        }

        /* ===== 隐藏滚动条 (Firefox) ===== */
        .card-back {
            scrollbar-width: thin;
            scrollbar-color: #d4c8b8 transparent;
        }
    </style>
</head>
<body>

    <div class="app">
        <!-- 返回按钮 -->
        <nav class="back-nav">
            <a href="index.html" class="back-btn">← 返回</a>
        </nav>

        <!-- 标题 -->
        <header class="app-header">
            <h1>📜 魏晋 · 快闪卡片</h1>
            <div class="sub">
                八首必背诗
                <span class="counter" id="counterDisplay">1 / 8</span>
            </div>
        </header>

        <!-- 卡片 -->
        <div class="card-container">
            <div class="card" id="card" role="button" tabindex="0" aria-label="点击翻转卡片">
                <!-- 正面 -->
                <div class="card-face card-front" id="frontFace">
                    <div class="poem-title" id="poemTitle">曹操 · 薤露行</div>
                    <div class="poem-author" id="poemAuthor">曹操</div>
                    <span class="hint-tap">👆 点击翻转</span>
                </div>
                <!-- 背面 -->
                <div class="card-face card-back" id="backFace">
                    <div class="back-header">
                        <span class="back-title" id="backTitle">薤露行</span>
                        <span class="back-author" id="backAuthor">曹操</span>
                    </div>
                    <div class="poem-body" id="poemBody">
                        惟汉廿二世，所任诚不良。<br />
                        沐猴而冠带，知小而谋强。
                    </div>
                </div>
            </div>
        </div>

        <!-- 圆点指示 -->
        <div class="dot-indicator" id="dotIndicator"></div>

        <!-- 控制栏 -->
        <div class="controls">
            <div class="nav-group">
                <button id="prevBtn" aria-label="上一首">◀ 上一首</button>
                <button id="nextBtn" aria-label="下一首">下一首 ▶</button>
            </div>

            <button class="btn-fav" id="favBtn" aria-label="收藏">
                <span class="fav-icon">☆</span> <span id="favText">收藏</span>
            </button>

            <button class="btn-primary" id="shuffleBtn" aria-label="随机翻牌">
                🎲 随机
            </button>
        </div>

        <!-- 收藏状态 -->
        <div class="fav-status" id="favStatus">
            <span id="favCount">0</span> 首已收藏
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // ============================================================
            //  数据 — 根据《诗文背诵.docx》全面更新
            // ============================================================
            const POEMS = [{
                id: 0,
                title: '薤露行',
                author: '曹操',
                body: `惟汉廿二世，所任诚不良。
        沐猴而冠带，知小而谋强。
        犹豫不敢断，因狩执君王。
        白虹为贯日，己亦先受殃。
        贼臣持国柄，杀主灭宇京。
        荡覆帝基业，宗庙以燔丧。
        播越西迁移，号泣而且行。
        瞻彼洛城郭，微子为哀伤。`
            }, {
                id: 1,
                title: '燕歌行',
                author: '曹丕',
                body: `秋风萧瑟天气凉，草木摇落露为霜，群燕辞归雁南翔，
        念君客游思断肠。慊慊思归恋故乡，何为淹留寄佗方？
        贱妾茕茕守空房，忧来思君不敢忘，不觉泪下沾衣裳。
        援琴鸣弦发清商，短歌微吟不能长。
        明月皎皎照我床，星汉西流夜未央。
        牵牛织女遥相望，尔独何辜限河梁？`
            }, {
                id: 2,
                title: '七哀诗',
                author: '王粲',
                body: `荆蛮非我乡，何为久滞淫？方舟溯大江，
        日暮愁我心。山冈有余映，岩阿增重阴。
        狐狸驰赴穴，飞鸟翔故林。流波激清响，
        猴猿临岸吟。迅风拂裳袂，白露沾衣襟。
        独夜不能寐，摄衣起抚琴。丝桐感人情，
        为我发悲音。羁旅无终极，忧思壮难任。`
            }, {
                id: 3,
                title: '咏怀诗',
                author: '阮籍',
                body: `嘉树下成蹊，东园桃与李。
        秋风吹飞藿，零落从此始。
        繁华有憔悴，堂上生荆杞。
        驱马舍之去，去上西山趾。
        一身不自保，何况恋妻子。
        凝霜被野草，岁暮亦云已。`
            }, {
                id: 4,
                title: '赠秀才入军',
                author: '嵇康',
                body: `息徒兰圃，秣马华山。
        流磻平皋，垂纶长川。
        目送归鸿，手挥五弦。
        俯仰自得，游心太玄。
        嘉彼钓叟，得鱼忘筌。
        郢人逝矣，谁与尽言？`
            }, {
                id: 5,
                title: '赴洛道中作',
                author: '陆机',
                body: `远游越山川，山川修且广。
        振策陟崇丘，安辔遵平莽。
        夕息抱影寐，朝徂衔思往。
        顿辔倚嵩岩，侧听悲风响。
        清露坠素辉，明月一何朗！
        抚枕不能寐，振衣独长想。`
            }, {
                id: 6,
                title: '咏史诗',
                author: '左思',
                body: `弱冠弄柔翰，卓荦观群书。
        著论准过秦，作赋拟子虚。
        边城苦鸣镝，羽檄飞京都。
        虽非甲胄士，畴昔览穰苴。
        长啸激清风，志若无东吴。
        铅刀贵一割，梦想逞良图。
        左眄澄江湘，右盼定羌胡。
        功成不受爵，长揖归田庐。`
            }, {
                id: 7,
                title: '登池上楼',
                author: '谢灵运',
                body: `潜虬媚幽姿，飞鸿响远音。
        薄霄愧云浮，栖川怍渊沉。
        进德智所拙，退耕力不任。
        徇禄反穷海，卧疴对空林。
        衾枕昧节候，褰开暂窥临。
        倾耳聆波澜，举目眺岖嵚。
        初景革绪风，新阳改故阴。
        池塘生春草，园柳变鸣禽。
        祈祈伤豳歌，萋萋感楚吟。
        索居易永久，离群难处心。
        持操岂独古，无闷徵在今。`
            }];

            // ============================================================
            //  状态
            // ============================================================
            let currentIndex = 0; // 0 ~ 7
            let isFlipped = false;
            let favSet = new Set();

            // DOM 引用
            const card = document.getElementById('card');
            const poemTitle = document.getElementById('poemTitle');
            const poemAuthor = document.getElementById('poemAuthor');
            const backTitle = document.getElementById('backTitle');
            const backAuthor = document.getElementById('backAuthor');
            const poemBody = document.getElementById('poemBody');
            const counterDisplay = document.getElementById('counterDisplay');
            const dotIndicator = document.getElementById('dotIndicator');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const favBtn = document.getElementById('favBtn');
            const favText = document.getElementById('favText');
            const favIcon = favBtn.querySelector('.fav-icon');
            const favCount = document.getElementById('favCount');
            const shuffleBtn = document.getElementById('shuffleBtn');

            // ============================================================
            //  辅助函数
            // ============================================================
            function formatBody(text) {
                return text.split('\n').map(line => line.trim() || ' ').join('<br />');
            }

            function updateCard(index) {
                const poem = POEMS[index];
                if (!poem) return;

                poemTitle.textContent = `${poem.author} · ${poem.title}`;
                poemAuthor.textContent = poem.author;
                backTitle.textContent = poem.title;
                backAuthor.textContent = poem.author;
                poemBody.innerHTML = formatBody(poem.body);

                counterDisplay.textContent = `${index + 1} / ${POEMS.length}`;
                updateDots();
                updateFavButton();

                if (isFlipped) {
                    card.classList.remove('flipped');
                    isFlipped = false;
                }

                prevBtn.disabled = (index === 0);
                nextBtn.disabled = (index === POEMS.length - 1);
                updateFavCount();
                poemBody.scrollTop = 0;
            }

            function updateDots() {
                const dots = dotIndicator.querySelectorAll('.dot');
                dots.forEach((dot, i) => {
                    dot.classList.toggle('active', i === currentIndex);
                    dot.classList.toggle('faved', favSet.has(i));
                });
            }

            function updateFavButton() {
                const isFav = favSet.has(currentIndex);
                favIcon.textContent = isFav ? '★' : '☆';
                favText.textContent = isFav ? '已收藏' : '收藏';
                favBtn.classList.toggle('active', isFav);
            }

            function updateFavCount() {
                favCount.textContent = favSet.size;
            }

            function toggleFav() {
                const id = currentIndex;
                if (favSet.has(id)) favSet.delete(id);
                else favSet.add(id);
                saveFav();
                updateFavButton();
                updateDots();
                updateFavCount();
            }

            // ============================================================
            //  本地存储
            // ============================================================
            function saveFav() {
                try {
                    localStorage.setItem('weijin_fav', JSON.stringify([...favSet]));
                } catch (_) {}
            }

            function loadFav() {
                try {
                    const raw = localStorage.getItem('weijin_fav');
                    if (raw) {
                        const arr = JSON.parse(raw);
                        if (Array.isArray(arr)) {
                            favSet = new Set(arr.filter(n => Number.isInteger(n) && n >= 0 && n < POEMS.length));
                        }
                    }
                } catch (_) {}
                updateFavCount();
            }

            // ============================================================
            //  导航
            // ============================================================
            function goTo(index) {
                if (index < 0 || index >= POEMS.length) return;
                if (index === currentIndex) {
                    flipCard();
                    return;
                }
                currentIndex = index;
                updateCard(currentIndex);
            }

            function flipCard() {
                isFlipped = !isFlipped;
                card.classList.toggle('flipped', isFlipped);
            }

            function next() {
                if (currentIndex < POEMS.length - 1) goTo(currentIndex + 1);
            }

            function prev() {
                if (currentIndex > 0) goTo(currentIndex - 1);
            }

            function shuffle() {
                let randomIndex = Math.floor(Math.random() * POEMS.length);
                let attempts = 0;
                while (randomIndex === currentIndex && attempts < 5) {
                    randomIndex = Math.floor(Math.random() * POEMS.length);
                    attempts++;
                }
                if (randomIndex !== currentIndex) goTo(randomIndex);
                else flipCard();
            }

            // ============================================================
            //  构建圆点
            // ============================================================
            function buildDots() {
                dotIndicator.innerHTML = '';
                POEMS.forEach((_, i) => {
                    const dot = document.createElement('button');
                    dot.className = 'dot';
                    dot.setAttribute('aria-label', `第 ${i+1} 首`);
                    dot.dataset.index = i;
                    dot.addEventListener('click', () => goTo(i));
                    dotIndicator.appendChild(dot);
                });
            }

            // ============================================================
            //  键盘支持
            // ============================================================
            function handleKeydown(e) {
                if (e.key === 'ArrowLeft') { e.preventDefault(); prev(); }
                else if (e.key === 'ArrowRight') { e.preventDefault(); next(); }
                else if (e.key === ' ' || e.key === 'Space') { e.preventDefault(); flipCard(); }
                else if (e.key === 'f' || e.key === 'F') { e.preventDefault(); toggleFav(); }
            }

            // ============================================================
            //  初始化
            // ============================================================
            function init() {
                buildDots();
                loadFav();
                currentIndex = 0;
                updateCard(0);
                updateFavCount();

                card.addEventListener('click', flipCard);
                prevBtn.addEventListener('click', prev);
                nextBtn.addEventListener('click', next);
                favBtn.addEventListener('click', toggleFav);
                shuffleBtn.addEventListener('click', shuffle);
                document.addEventListener('keydown', handleKeydown);
                card.addEventListener('dblclick', (e) => e.preventDefault());
            }

            init();
        })();
    </script>

</body>
</html>
