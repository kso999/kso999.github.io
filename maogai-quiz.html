<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>毛概刷题 · 全题库</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #f5f7fb;
            color: #1f2937;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .app {
            max-width: 840px;
            width: 100%;
            max-height: 98vh;
            overflow-y: auto;
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
            padding: 24px 28px 20px;
            scroll-behavior: smooth;
        }
        .app::-webkit-scrollbar {
            width: 4px;
        }
        .app::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 8px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 18px;
            border-bottom: 1px solid #eef2f6;
            padding-bottom: 14px;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
        }
        .header-left h1 {
            font-size: 20px;
            font-weight: 600;
            background: linear-gradient(135deg, #b31b1b, #8b0000);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 0.5px;
        }
        .badge {
            background: #eef2f6;
            color: #374151;
            font-size: 13px;
            padding: 2px 12px;
            border-radius: 40px;
            font-weight: 500;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 14px;
            font-size: 14px;
            color: #6b7280;
        }
        .progress-text {
            font-weight: 500;
            background: #f3f4f6;
            padding: 4px 14px;
            border-radius: 40px;
        }
        .star-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            transition: 0.15s;
            line-height: 1;
            padding: 0 4px;
            color: #d1d5db;
        }
        .star-btn.active {
            color: #f59e0b;
        }
        .star-btn:hover {
            transform: scale(1.15);
        }

        .progress-bar-wrap {
            width: 100%;
            height: 4px;
            background: #e5e7eb;
            border-radius: 8px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #b31b1b, #dc2626);
            border-radius: 8px;
            transition: width 0.25s ease;
        }

        .question-area {
            min-height: 280px;
            padding: 4px 0 8px;
        }
        .q-type {
            display: inline-block;
            font-size: 12px;
            font-weight: 600;
            color: #ffffff;
            background: #6b7280;
            padding: 2px 14px;
            border-radius: 40px;
            letter-spacing: 0.3px;
            margin-bottom: 12px;
        }
        .q-type.single { background: #2563eb; }
        .q-type.multiple { background: #7c3aed; }
        .q-type.essay { background: #059669; }
        .q-type.short { background: #d97706; }
        .q-type.material { background: #dc2626; }
        .q-type.judge { background: #0891b2; }

        .q-title {
            font-size: 17px;
            font-weight: 500;
            line-height: 1.7;
            margin-bottom: 16px;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin: 10px 0 16px;
        }
        .option-item {
            padding: 12px 18px;
            background: #f9fafb;
            border: 2px solid #e5e7eb;
            border-radius: 14px;
            cursor: pointer;
            transition: 0.15s;
            font-size: 15px;
            line-height: 1.5;
            display: flex;
            align-items: baseline;
            gap: 8px;
        }
        .option-item:hover {
            background: #f3f4f6;
            border-color: #d1d5db;
        }
        .option-item .opt-label {
            font-weight: 600;
            color: #4b5563;
            min-width: 22px;
        }
        .option-item.correct {
            background: #dcfce7;
            border-color: #22c55e;
        }
        .option-item.correct .opt-label {
            color: #16a34a;
        }
        .option-item.wrong {
            background: #fee2e2;
            border-color: #ef4444;
        }
        .option-item.wrong .opt-label {
            color: #dc2626;
        }
        .option-item.disabled {
            cursor: default;
            opacity: 0.85;
        }
        .option-item.disabled:hover {
            background: #f9fafb;
            border-color: #e5e7eb;
        }
        .option-item.disabled.correct:hover {
            background: #dcfce7;
            border-color: #22c55e;
        }
        .option-item.disabled.wrong:hover {
            background: #fee2e2;
            border-color: #ef4444;
        }

        .answer-box {
            margin: 14px 0 10px;
            padding: 14px 18px;
            background: #f0fdf4;
            border-left: 4px solid #22c55e;
            border-radius: 12px;
            font-size: 15px;
            line-height: 1.7;
            display: none;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .answer-box.show {
            display: block;
        }
        .answer-box .ans-label {
            font-weight: 600;
            color: #15803d;
            margin-right: 6px;
        }
        .answer-box .ans-content {
            color: #1e293b;
        }
        .material-box {
            background: #f8fafc;
            border-radius: 14px;
            padding: 16px 18px;
            margin: 8px 0 16px;
            border: 1px solid #e2e8f0;
            font-size: 14px;
            line-height: 1.8;
            color: #334155;
            max-height: 220px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .material-box .mat-label {
            font-weight: 600;
            color: #0f172a;
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            letter-spacing: 0.3px;
        }
        .show-ans-btn {
            margin: 8px 0 4px;
            padding: 10px 26px;
            background: #1f2937;
            color: #fff;
            border: none;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.15s;
            display: inline-block;
        }
        .show-ans-btn:hover {
            background: #111827;
            transform: scale(0.97);
        }
        .show-ans-btn:active {
            transform: scale(0.94);
        }

        .footer-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 24px;
            padding-top: 18px;
            border-top: 1px solid #eef2f6;
        }
        .nav-group {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .nav-btn {
            padding: 8px 22px;
            background: #f3f4f6;
            border: none;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            color: #1f2937;
            cursor: pointer;
            transition: 0.12s;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .nav-btn:hover:not(:disabled) {
            background: #e5e7eb;
        }
        .nav-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .nav-btn.primary {
            background: #b31b1b;
            color: #fff;
        }
        .nav-btn.primary:hover:not(:disabled) {
            background: #8b0000;
        }
        .jump-input {
            width: 54px;
            padding: 6px 4px;
            text-align: center;
            border: 1.5px solid #d1d5db;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            outline: none;
            transition: 0.12s;
        }
        .jump-input:focus {
            border-color: #b31b1b;
            box-shadow: 0 0 0 3px rgba(179, 27, 27, 0.15);
        }
        .jump-btn {
            padding: 6px 16px;
            background: #e5e7eb;
            border: none;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.12s;
        }
        .jump-btn:hover {
            background: #d1d5db;
        }
        .total-badge {
            font-size: 13px;
            color: #6b7280;
            font-weight: 500;
        }

        @media (max-width: 600px) {
            .app {
                padding: 16px 14px;
                border-radius: 20px;
                max-height: 96vh;
            }
            .header-left h1 { font-size: 17px; }
            .q-title { font-size: 15px; }
            .option-item { padding: 10px 14px; font-size: 14px; }
            .footer-nav { flex-direction: column; align-items: stretch; }
            .nav-group { justify-content: center; }
            .nav-btn { padding: 6px 16px; font-size: 13px; }
            .jump-input { width: 46px; }
        }
        .material-box::-webkit-scrollbar { width: 4px; }
        .material-box::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 8px; }
        .material-box::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
        .star-btn.active { animation: starPop 0.2s ease; }
        @keyframes starPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.35); }
            100% { transform: scale(1); }
        }
        .error-msg {
            color: #b91c1c;
            background: #fee2e2;
            padding: 16px 20px;
            border-radius: 16px;
            border-left: 4px solid #dc2626;
        }
    </style>
</head>
<body>

<a href="index.html" style="display:block;text-align:center;padding:10px;background:#eee;text-decoration:none;color:#222;border-radius:8px;margin:10px auto;max-width:600px;">← 返回导航首页</a>

    <div class="app" id="app">
        <div class="header">
            <div class="header-left">
                <h1>📘 毛概刷题</h1>
                <span class="badge" id="typeBadge">全题库</span>
            </div>
            <div class="header-right">
                <span class="progress-text" id="progressText">1 / 46</span>
                <button class="star-btn" id="starBtn" title="收藏本题">☆</button>
            </div>
        </div>
        <div class="progress-bar-wrap">
            <div class="progress-bar-fill" id="progressFill"></div>
        </div>
        <div class="question-area" id="questionArea"></div>
        <div class="footer-nav">
            <div class="nav-group">
                <button class="nav-btn" id="prevBtn">‹ 上一题</button>
                <button class="nav-btn" id="nextBtn">下一题 ›</button>
                <button class="nav-btn primary" id="randomBtn">🎲 随机</button>
            </div>
            <div class="nav-group">
                <span class="total-badge" id="totalBadge">共 46 题</span>
                <input type="number" class="jump-input" id="jumpInput" min="1" max="46" value="1">
                <button class="jump-btn" id="jumpBtn">跳转</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            "use strict";

            // ============================================================
            // 1. 完整题库数据 (直接使用对象数组，避免函数作用域问题)
            // ============================================================
            const questions = [];

            // 辅助：添加单选题
            function addSingle(title, answer, optionsStr) {
                const opts = optionsStr.split(' ').filter(s => s.trim().length > 0);
                questions.push({
                    id: questions.length + 1,
                    type: 'single',
                    title: title,
                    answer: answer,
                    options: opts,
                    material: null,
                    subQuestions: null,
                    collected: false,
                    _revealed: false,
                    _selected: []
                });
            }

            // 辅助：添加多选题
            function addMultiple(title, answer, optionsStr) {
                const opts = optionsStr.split(' ').filter(s => s.trim().length > 0);
                questions.push({
                    id: questions.length + 1,
                    type: 'multiple',
                    title: title,
                    answer: answer,
                    options: opts,
                    material: null,
                    subQuestions: null,
                    collected: false,
                    _revealed: false,
                    _selected: []
                });
            }

            // 辅助：添加其他类型（论述、简答、辨析、材料等）
            function addGeneral(type, title, answer, material, subQuestions) {
                questions.push({
                    id: questions.length + 1,
                    type: type,
                    title: title,
                    answer: answer || null,
                    options: null,
                    material: material || null,
                    subQuestions: subQuestions || null,
                    collected: false,
                    _revealed: false,
                    _selected: []
                });
            }

            // ----- 单选题 1~15 -----
            const singleData = [
                ['全面贯彻"三个代表"重要思想的关键在（A）', 'A', 'A、坚持与时俱进 B、坚持党的先进性 C、坚持执政为民 D、坚持党的领导'],
                ['邓小平理论的精髓是（B）', 'B', 'A、解放生产力,发展生产力 B、解放思想,实事求是 C、坚持四项基本原则 D、"三个有利于"标准'],
                ['消灭剥削的物质前提是（B）', 'B', 'A、实行公有制 B、生产力的高度发达 C、实行人民民主专政 D、实行按劳分配'],
                ['我国社会主义初级阶段的时间是指（B）', 'B', 'A、中华人民共和国成立到社会主义现代化基本实现 B、社会主义改造基本完成到社会主义现代化基本实现 C、中华人民共和国成立到社会主义改造基本完成 D、社会主义改造基本完成到共产主义社会'],
                ['坚持党的基本路线一百年不动摇的关键是（A）', 'A', 'A、坚持以经济建设为中心不动摇 B、坚持"两手抓,两手都要硬"的方针不动摇 C、坚持四项基本原则不动摇 D、坚持改革开放不动摇'],
                ['我国社会主义建设的战略目标是（D）', 'D', 'A、实现农业、工业、国防和科学技术现代化 B、实现工业化、社会化、市场化、和现代化 C、实现政治、经济和文化的现代化 D、把我国建设成为富强、民主、文明的社会主义现代化国家'],
                ['我国的工业化任务还没有完成，总体上看，现在还处于（C）', 'C', 'A、农业社会 B、现代化工业社会 C、工业化中期阶段 D、工业化高级阶段'],
                ['实现全面建设小康社会的目标重点和难点在（D）', 'D', 'A、大城市 B、中等城市 C、小城镇 D、农村'],
                ['实行以家庭承包经营为基础、统分结合的双层经营体制，是党在农村的基本政策，必须长期坚持。稳定和完善这一双层经营体制的关键和核心是（A）', 'A',
                    'A、稳定和完善土地承包关系 B、完善农村所有制结构 C、尊重农民的首创精神 D、发展规模经济'
                ],
                ['改革开放以来，对社会主义可以实行市场经济在理论认识上重大突破是（D）', 'D', 'A、市场经济是法治经济 B、市场对资源配置起基础性作用 C、市场经济是国家宏观调控的经济 D、市场经济不属于社会基本制度的范畴'],
                ['社会主义市场经济条件下，市场机制（A）', 'A', 'A、对资源配置起基础性作用 B、能确保经济总量的平衡 C、可以实现经济结构的平衡 D、可以保障社会公平'],
                ['私营经济中的劳动者的收入属于（C）', 'C', 'A、按劳分配收入 B、按资分配 C、按劳动力价值分配 D、按经营分配'],
                ['人民民主是社会主义的本质要求和内在属性，归根到底是（A）', 'A', 'A、是社会主义公有制经济在政治上的集中体现 B、有利于调动最广大人民群众的积极性 C、是社会主义制度优越性的重要体现 D、体现了多数人对少数人的专政'],
                ['在下列收入中属于按劳分配性质的收入是（B）', 'B', 'A、个体劳动者的劳动收入 B、集体企业职工的工资收入 C、股份制企业职工的按股分红收入 D、国有企业工程师业余帮助乡镇企业搞设计获得的收入'],
                ['社会主义精神文明建设的基本内容是（B）', 'B', 'A、培育和弘扬民族精神及培育"四有"公民 B、加强思想道德建设，发展教育科学文化 C、加强马列主义、毛泽东思想、邓小平理论教育 D、坚持党的基本路线和基本方针']
            ];
            singleData.forEach(item => addSingle(item[0], item[1], item[2]));

            // ----- 多选题 16~25 -----
            const multiData = [
                { title: '党的十五大指出邓小平理论是马克思主义在中国发展的新阶段，其基本依据是（ABDE）', answer: 'ABDE',
                    options: 'A、开拓了马克思主义的新境界 B、提出了新的世界观和方法论 C、把对社会主义的认识提高到新的科学水平 D、对当今时代特征和总体国际局势做出新的科学判断 E、形成了新的建设中国特色社会主义理论的科学体系' },
                { title: '"三个有利于"判断标准是（ABC）', answer: 'ABC', options: 'A、生产力标准的深化 B、实践标准与真理标准的统一 C、实践标准在社会领域的深化和具体化 D、解放思想，实事求是的统一 E、四项基本原则的具体统一' },
                { title: '社会主义按劳分配的必然性是：（ABC）', answer: 'ABC',
                    options: 'A、社会主义生产资料公有制是实行按劳分配的前提条件 B、社会主义生产力发展水平是实行按劳分配的物质条件 C、劳动还存在着种大差别，劳动还是谋生的手段，是实行按劳分配的直接原因 D、多种所有制经济存在是根本原因 E、社会主义市场经济的发展是直接原因' },
                { title: '确立社会主义根本任务的依据是（ABCD）', answer: 'ABCD',
                    options: 'A、生产力是社会发展的最根本的决定性因素 B、社会主义本质决定的 C、解决社会主义初级阶段主要矛盾的要求 D、体现社会主义制度优越性的基本条件 E、适应当今世界"和平与发展"时代的要求' },
                { title: '邓小平指出"改革是中国的第二次革命"，其含义是指（BCDE）', answer: 'BCDE',
                    options: 'A、改革与第一次革命具有相同的内容 B、改革也是解放生产力 C、改革是对原有经济体制的根本性变革 D、改革引起了社会生活的深刻变化 E、改革是社会主义发展的直接动力' },
                { title: '我国经济社会发展战略的特点是（ABCD）', answer: 'ABCD',
                    options: 'A、既具有雄心壮志，又坚持实事求是 B、注重社会全面协调发展 C、以提高人民生活水平为出发点和归宿点 D、体现了社会主义制度的优越性 E、是赶超发达国家的发展战略' },
                { title: '社会主义市场经济体制（ABC）', answer: 'ABC',
                    options: 'A、是我国经济体制改革的目标 B、是同社会主义基本制度结合在一起的 C、是市场在社会主义国家宏观调控下对资源配置起基础性作用的经济体制 D、是同资本主义市场经济完全相同的 E、是市场对社会经济完全起作用的' },
                { title: '中国外交政策的主要目标是（AB）', answer: 'AB',
                    options: 'A、反对霸权主义,维护世界和平 B、增强国际合作,促进共同发展 C、坚持独立自主 D、和平共处 E、加强同第三世界的团结与合作' },
                { title: '社会变革中出现的社会阶层包括（ABCDE）', answer: 'ABCDE',
                    options: 'A、民营科技企业的创业人员和技术人员 B、受聘于外资企业的管理人员和技术人员 C、个体户、私营企业主 D、中介组织的从业人员 E、自由职业人员' },
                { title: '在新的历史时期，党面临的两大历史性课题是（AE）', answer: 'AE',
                    options: 'A、提高党的领导水平和执政水平 B、建立市场经济体制 C、国企改革 D、防止西方和平演变 E、提高拒腐防变和抵御风险能力' }
            ];
            multiData.forEach(item => addMultiple(item.title, item.answer, item.options));

            addGeneral('material', '《论十大关系》材料分析', null, shidaMaterial, [

                    answer: '毛泽东指出，一切民族、一切国家的长处都要学，但一定要有分析有批判地吸收对我们有益的东西。在对待外国经验上，应正确处理独立自主与学习外国的关系。第一，学习外国有助于打开眼界，看到差距，从而激励独立自主的意志和决心。第二，学习外国有助于增强我国独立自主、自力更生的能力，加快赶超世界先进水平的步伐。'

            // 重新设置id（确保连续）
            questions.forEach((q, idx) => q.id = idx + 1);
            const total = questions.length;
            document.getElementById('totalBadge').textContent = `共 ${total} 题`;

            // ============================================================
            // 2. DOM引用 & 状态
            // ============================================================
            let currentIdx = 0;
            const qArea = document.getElementById('questionArea');
            const progressText = document.getElementById('progressText');
            const progressFill = document.getElementById('progressFill');
            const starBtn = document.getElementById('starBtn');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const randomBtn = document.getElementById('randomBtn');
            const jumpInput = document.getElementById('jumpInput');
            const jumpBtn = document.getElementById('jumpBtn');

            // ============================================================
            // 3. 渲染函数
            // ============================================================
            function renderQuestion(index) {
                try {
                    if (!questions || questions.length === 0) {
                        qArea.innerHTML = '<div class="error-msg">题库为空，请检查数据</div>';
                        return;
                    }
                    const q = questions[index];
                    if (!q) {
                        qArea.innerHTML = `<div class="error-msg">题目 ${index+1} 不存在</div>`;
                        return;
                    }

                    // 更新进度
                    progressText.textContent = `${index + 1} / ${total}`;
                    progressFill.style.width = `${((index + 1) / total) * 100}%`;
                    updateStarBtn(q);

                    let html = '';
                    const typeMap = {
                        single: '单选题',
                        multiple: '多选题',
                        judge: '辨析题',
                        essay: '论述题',
                        short: '简答题',
                        material: '材料题'
                    };
                    const typeClass = q.type || 'essay';
                    html += `<span class="q-type ${typeClass}">${typeMap[typeClass] || '题目'}</span>`;
                    html += `<div class="q-title">${q.title || '（题目内容为空）'}</div>`;

                    // 材料
                    if (q.material) {
                        html += `<div class="material-box"><span class="mat-label">📄 材料</span>${q.material}</div>`;
                    }

                    // 选择题选项
                    if (q.options && q.options.length > 0) {
                        html += `<div class="options" id="optionsContainer">`;
                        const labels = 'ABCDEFGHIJKLMN'.split('');
                        q.options.forEach((opt, idx) => {
                            const label = labels[idx] || '?';
                            const isCorrect = q._revealed && q.answer && q.answer.includes(label);
                            const isWrong = q._revealed && q.answer && !q.answer.includes(label) && q._selected && q
                                ._selected.includes(label);
                            let cls = 'option-item';
                            if (q._revealed) {
                                cls += ' disabled';
                                if (isCorrect) cls += ' correct';
                                if (isWrong) cls += ' wrong';
                            }
                            html += `<div class="${cls}" data-opt="${label}" data-qid="${q.id}">
                                        <span class="opt-label">${label}.</span>
                                        <span>${opt.replace(/^[A-Z]、/, '').trim()}</span>
                                     </div>`;
                        });
                        html += `</div>`;
                    }

                    // 子题目（材料题多小问）
                    if (q.subQuestions && q.subQuestions.length > 0) {
                        q.subQuestions.forEach((sub, idx) => {
                            const ansKey = `_subAns_${idx}`;
                            const revealed = q[ansKey] || false;
                            html += `<div style="margin-top:16px;padding-top:12px;border-top:1px dashed #e5e7eb;">
                                        <div style="font-weight:500;font-size:15px;margin-bottom:6px;">${sub.title}</div>
                                        ${revealed ? `<div class="answer-box show"><span class="ans-label">✅ 答案</span><span class="ans-content">${sub.answer}</span></div>` : `<button class="show-ans-btn" data-subidx="${idx}" data-qid="${q.id}">显示答案</button>`}
                                     </div>`;
                        });
                    }

                    // 非选择题（无选项、无子题目）
                    if (!q.options && !q.subQuestions) {
                        if (q._revealed) {
                            html += `<div class="answer-box show"><span class="ans-label">✅ 参考答案</span><span class="ans-content">${q.answer || '无参考答案'}</span></div>`;
                        } else {
                            html += `<button class="show-ans-btn" data-qid="${q.id}">显示答案</button>`;
                        }
                    }

                    // 选择题显示正确答案
                    if (q.options && q.options.length > 0 && q._revealed) {
                        html += `<div class="answer-box show"><span class="ans-label">✅ 正确答案</span><span class="ans-content">${q.answer}</span></div>`;
                    }

                    qArea.innerHTML = html;

                    // ----- 绑定事件 -----

                    // 选择题点击
                    if (q.options && q.options.length > 0) {
                        const optItems = qArea.querySelectorAll('.option-item:not(.disabled)');
                        optItems.forEach(el => {
                            el.addEventListener('click', function() {
                                if (q._revealed) return;
                                const label = this.dataset.opt;
                                if (!q._selected) q._selected = [];
                                if (q.type === 'single') {
                                    q._selected = [label];
                                } else {
                                    const idx = q._selected.indexOf(label);
                                    if (idx > -1) q._selected.splice(idx, 1);
                                    else q._selected.push(label);
                                }
                                q._revealed = true;
                                renderQuestion(index);
                            });
                        });
                    }

                    // 显示答案按钮（主按钮）
                    qArea.querySelectorAll('.show-ans-btn[data-qid]:not([data-subidx])').forEach(btn => {
                        btn.addEventListener('click', function() {
                            const qid = parseInt(this.dataset.qid);
                            const qq = questions.find(q => q.id === qid);
                            if (qq) {
                                qq._revealed = true;
                                renderQuestion(index);
                            }
                        });
                    });

                    // 显示答案按钮（子题目）
                    qArea.querySelectorAll('.show-ans-btn[data-subidx]').forEach(btn => {
                        btn.addEventListener('click', function() {
                            const qid = parseInt(this.dataset.qid);
                            const subIdx = parseInt(this.dataset.subidx);
                            const qq = questions.find(q => q.id === qid);
                            if (qq && qq.subQuestions) {
                                qq[`_subAns_${subIdx}`] = true;
                                renderQuestion(index);
                            }
                        });
                    });

                    // 导航按钮状态
                    prevBtn.disabled = index === 0;
                    nextBtn.disabled = index === total - 1;
                    jumpInput.value = index + 1;
                    jumpInput.max = total;
                } catch (e) {
                    qArea.innerHTML = `<div class="error-msg">渲染出错：${e.message}，请刷新页面</div>`;
                    console.error(e);
                }
            }

            // ============================================================
            // 4. 收藏
            // ============================================================
            function updateStarBtn(q) {
                if (q.collected) {
                    starBtn.textContent = '★';
                    starBtn.classList.add('active');
                } else {
                    starBtn.textContent = '☆';
                    starBtn.classList.remove('active');
                }
            }
            starBtn.addEventListener('click', function() {
                const q = questions[currentIdx];
                q.collected = !q.collected;
                updateStarBtn(q);
            });

            // ============================================================
            // 5. 导航 & 随机
            // ============================================================
            function goTo(index) {
                if (index < 0 || index >= total) return;
                currentIdx = index;
                renderQuestion(currentIdx);
                document.querySelector('.app').scrollTop = 0;
            }

            prevBtn.addEventListener('click', () => goTo(currentIdx - 1));
            nextBtn.addEventListener('click', () => goTo(currentIdx + 1));
            randomBtn.addEventListener('click', () => {
                const randomIdx = Math.floor(Math.random() * total);
                goTo(randomIdx);
            });
            jumpBtn.addEventListener('click', function() {
                let val = parseInt(jumpInput.value);
                if (isNaN(val) || val < 1) val = 1;
                if (val > total) val = total;
                goTo(val - 1);
            });
            jumpInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') jumpBtn.click();
            });
            document.addEventListener('keydown', function(e) {
                if (e.target.tagName === 'INPUT') return;
                if (e.key === 'ArrowLeft') prevBtn.click();
                else if (e.key === 'ArrowRight') nextBtn.click();
            });

            // ============================================================
            // 6. 启动
            // ============================================================
            renderQuestion(0);
        })();
    </script>
</body>
</html>
