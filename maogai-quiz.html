<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>毛概刷题 · 全题库（含第三章后）</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #f5f7fb;
            color: #1f2937;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .app {
            max-width: 840px;
            width: 100%;
            max-height: 98vh;
            overflow-y: auto;
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
            padding: 24px 28px 20px;
            scroll-behavior: smooth;
        }
        .app::-webkit-scrollbar { width: 4px; }
        .app::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 8px; }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 18px;
            border-bottom: 1px solid #eef2f6;
            padding-bottom: 14px;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
        }
        .header-left h1 {
            font-size: 20px;
            font-weight: 600;
            background: linear-gradient(135deg, #b31b1b, #8b0000);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 0.5px;
        }
        .back-link {
            display: flex;
            align-items: center;
            gap: 4px;
            text-decoration: none;
            color: #374151;
            font-weight: 500;
            font-size: 16px;
            padding: 4px 8px;
            border-radius: 40px;
            transition: background 0.15s;
        }
        .back-link:hover { background: #f3f4f6; }
        .badge {
            background: #eef2f6;
            color: #374151;
            font-size: 13px;
            padding: 2px 12px;
            border-radius: 40px;
            font-weight: 500;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 14px;
            font-size: 14px;
            color: #6b7280;
        }
        .progress-text {
            font-weight: 500;
            background: #f3f4f6;
            padding: 4px 14px;
            border-radius: 40px;
        }
        .star-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            transition: 0.15s;
            line-height: 1;
            padding: 0 4px;
            color: #d1d5db;
        }
        .star-btn.active { color: #f59e0b; }
        .star-btn:hover { transform: scale(1.15); }

        .progress-bar-wrap {
            width: 100%;
            height: 4px;
            background: #e5e7eb;
            border-radius: 8px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #b31b1b, #dc2626);
            border-radius: 8px;
            transition: width 0.25s ease;
        }

        .question-area {
            min-height: 280px;
            padding: 4px 0 8px;
        }
        .q-type {
            display: inline-block;
            font-size: 12px;
            font-weight: 600;
            color: #ffffff;
            background: #6b7280;
            padding: 2px 14px;
            border-radius: 40px;
            letter-spacing: 0.3px;
            margin-bottom: 12px;
        }
        .q-type.single { background: #2563eb; }
        .q-type.multiple { background: #7c3aed; }

        .q-title {
            font-size: 17px;
            font-weight: 500;
            line-height: 1.7;
            margin-bottom: 16px;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin: 10px 0 16px;
        }
        .option-item {
            padding: 12px 18px;
            background: #f9fafb;
            border: 2px solid #e5e7eb;
            border-radius: 14px;
            cursor: pointer;
            transition: 0.15s;
            font-size: 15px;
            line-height: 1.5;
            display: flex;
            align-items: baseline;
            gap: 8px;
        }
        .option-item:hover {
            background: #f3f4f6;
            border-color: #d1d5db;
        }
        .option-item .opt-label {
            font-weight: 600;
            color: #4b5563;
            min-width: 22px;
        }
        .option-item.correct {
            background: #dcfce7;
            border-color: #22c55e;
        }
        .option-item.correct .opt-label { color: #16a34a; }
        .option-item.wrong {
            background: #fee2e2;
            border-color: #ef4444;
        }
        .option-item.wrong .opt-label { color: #dc2626; }
        .option-item.disabled {
            cursor: default;
            opacity: 0.85;
        }
        .option-item.disabled:hover {
            background: #f9fafb;
            border-color: #e5e7eb;
        }
        .option-item.disabled.correct:hover {
            background: #dcfce7;
            border-color: #22c55e;
        }
        .option-item.disabled.wrong:hover {
            background: #fee2e2;
            border-color: #ef4444;
        }

        .answer-box {
            margin: 14px 0 10px;
            padding: 14px 18px;
            background: #f0fdf4;
            border-left: 4px solid #22c55e;
            border-radius: 12px;
            font-size: 15px;
            line-height: 1.7;
            display: none;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .answer-box.show { display: block; }
        .answer-box .ans-label {
            font-weight: 600;
            color: #15803d;
            margin-right: 6px;
        }
        .answer-box .ans-content { color: #1e293b; }

        .footer-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 24px;
            padding-top: 18px;
            border-top: 1px solid #eef2f6;
        }
        .nav-group {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .nav-btn {
            padding: 8px 22px;
            background: #f3f4f6;
            border: none;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            color: #1f2937;
            cursor: pointer;
            transition: 0.12s;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .nav-btn:hover:not(:disabled) { background: #e5e7eb; }
        .nav-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .nav-btn.primary {
            background: #b31b1b;
            color: #fff;
        }
        .nav-btn.primary:hover:not(:disabled) { background: #8b0000; }
        .jump-input {
            width: 54px;
            padding: 6px 4px;
            text-align: center;
            border: 1.5px solid #d1d5db;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            outline: none;
            transition: 0.12s;
        }
        .jump-input:focus {
            border-color: #b31b1b;
            box-shadow: 0 0 0 3px rgba(179, 27, 27, 0.15);
        }
        .jump-btn {
            padding: 6px 16px;
            background: #e5e7eb;
            border: none;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.12s;
        }
        .jump-btn:hover { background: #d1d5db; }
        .total-badge {
            font-size: 13px;
            color: #6b7280;
            font-weight: 500;
        }

        @media (max-width: 600px) {
            .app { padding: 16px 14px; border-radius: 20px; max-height: 96vh; }
            .header-left h1 { font-size: 17px; }
            .q-title { font-size: 15px; }
            .option-item { padding: 10px 14px; font-size: 14px; }
            .footer-nav { flex-direction: column; align-items: stretch; }
            .nav-group { justify-content: center; }
            .nav-btn { padding: 6px 16px; font-size: 13px; }
            .jump-input { width: 46px; }
        }
        .star-btn.active { animation: starPop 0.2s ease; }
        @keyframes starPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.35); }
            100% { transform: scale(1); }
        }
        .error-msg {
            color: #b91c1c;
            background: #fee2e2;
            padding: 16px 20px;
            border-radius: 16px;
            border-left: 4px solid #dc2626;
        }
    </style>
</head>
<body>
<div class="app" id="app">
    <div class="header">
        <div class="header-left">
            <a href="index.html" class="back-link">← 返回</a>
            <h1>📘 毛概刷题</h1>
            <span class="badge" id="typeBadge">全题库</span>
        </div>
        <div class="header-right">
            <span class="progress-text" id="progressText">1 / 46</span>
            <button class="star-btn" id="starBtn" title="收藏本题">☆</button>
        </div>
    </div>
    <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progressFill"></div>
    </div>
    <div class="question-area" id="questionArea"></div>
    <div class="footer-nav">
        <div class="nav-group">
            <button class="nav-btn" id="prevBtn">‹ 上一题</button>
            <button class="nav-btn" id="nextBtn">下一题 ›</button>
            <button class="nav-btn primary" id="randomBtn">🎲 随机</button>
        </div>
        <div class="nav-group">
            <span class="total-badge" id="totalBadge">共 46 题</span>
            <input type="number" class="jump-input" id="jumpInput" min="1" max="46" value="1">
            <button class="jump-btn" id="jumpBtn">跳转</button>
        </div>
    </div>
</div>

<script>
    (function() {
        "use strict";

        const questions = [];

        // ----- 辅助函数 -----
        function addSingle(title, answer, optionsStr) {
            const opts = optionsStr.split(' ').filter(s => s.trim().length > 0);
            questions.push({
                id: questions.length + 1,
                type: 'single',
                title: title,
                answer: answer,
                options: opts,
                collected: false,
                _revealed: false,
                _selected: []
            });
        }

        function addMultiple(title, answer, optionsStr) {
            const opts = optionsStr.split(' ').filter(s => s.trim().length > 0);
            questions.push({
                id: questions.length + 1,
                type: 'multiple',
                title: title,
                answer: answer,
                options: opts,
                collected: false,
                _revealed: false,
                _selected: []
            });
        }

        // ============================================================
        // 第三章 新民主主义革命理论 (单选题 + 多选题)
        // ============================================================

        // --- 第三章 单选 ---
        const single3 = [
            ['二十世纪中国的第一次历史性巨变是', 'A', 'A.辛亥革命推翻封建帝制 B.签订《南京条约》 C.五四运动 D.建立新中国'],
            ['中国革命的基本问题是', 'C', 'A.军队问题 B.工人问题 C.农民问题 D.知识分子问题'],
            ['中国革命的主力军和无产阶级最可靠的同盟军是', 'B', 'A.知识分子 B.农民 C.小资产阶级 D.手工业者'],
            ['新民主主义革命的性质是', 'A', 'A.新式的特殊的资产阶级革命 B.无产阶级革命 C.农民革命 D.社会主义革命'],
            ['中国革命的主要形式是', 'C', 'A.议会斗争 B.经济斗争 C.武装斗争 D.文化斗争'],
            ['近代中国沦为半殖民地半封建社会的根本原因是', 'B', 'A.农民革命斗争的失败 B.中国封建主义的统治 C.中国资本主义的软弱 D.帝国主义的侵略'],
            ['区别旧民主主义革命与新民主主义革命的根本标志是', 'B', 'A.革命的指导思想不同 B.革命的领导阶级不同 C.革命的前途不同 D.革命的对象不同'],
            ['新民主主义革命的目的是', 'D', 'A.取消帝国主义在中国的种种特权 B.消灭地主阶级和官僚资产阶级的剥削和压迫，改变买办的封建的生产关系 C.打到军阀统治，实现祖国统一 D.从根本上解放被束缚的生产力'],
            ['在中国共产党七届二中全会上，毛泽东告诫全党："务必使同志们继续地保持谦虚、谨慎、不骄、不躁的作风，务必使同志们继续地保持艰苦奋斗的作风。"其原因主要是', 'A', 'A.中国共产党即将成为执政党 B.党的工作方式发生了变化 C.全国大陆即将解放 D.中国将由新民主主义社会转变为社会主义社会'],
            ['关于民主革命和社会主义革命的关系，表述不正确的是', 'C', 'A.二者是中国革命进程必经的两个阶段 B.民主革命是社会主义革命的必要准备，社会主义革命是民主革命的必然趋势 C.二者可以同时进行，"毕其功于一役" D.二者体现了党的最低纲领和最高纲领的辩证统一'],
            ['毛泽东指出，解决中国一切革命问题的最基本的根据是', 'C', 'A.正确分析中国社会的阶级状况 B.正确分析中国社会的经济结构 C.认清中国社会的特殊国情 D.认清中国社会的主要矛盾'],
            ['毛泽东对近代中国半殖民地半封建社会的主要特点作了具体分析和论述的著作是', 'A', 'A.《中国革命与中国共产党》 B.《中国社会各阶级的分析》 C.《新民主主义论》 D.《论联合政府》'],
            ['毛泽东首次在下列哪部文献中提出了"新民主主义革命"科学概念？', 'A', 'A.《中国革命与中国共产党》 B.《中国社会各阶级的分析》 C.《新民主主义论》 D.《中国红色政权为什么能够存在》']
        ];
        single3.forEach(item => addSingle(item[0], item[1], item[2]));

        // --- 第三章 多选 ---
        const multi3 = [
            { title: '近代中国革命的对象是', answer: 'ABD', options: 'A.封建主义 B.帝国主义 C.资本主义 D.官僚资本主义' },
            { title: '构成新民主主义革命总路线中的"人民大众"的阶级是', answer: 'ABCD', options: 'A.无产阶级 B.城市小资产阶级 C.农民阶级 D.民族资产阶级' },
            { title: '在中国，资产阶级共和国让位于人民共和国是历史发展的必然，因为', answer: 'ABCD', options: 'A.帝国主义要把中国变为它们的殖民地、半殖民地，不允许在中国建立资产阶级共和国。 B.社会主义国家和世界无产阶级不允许。 C.国民党统治集团是大地主大资产阶级的政治代表，他们坚持国民经济一党专政，不允许建立资产阶级共和国。 D.中国民族资产阶级本身的软弱性决定其不能实现建立资产阶级共和国的方案，以及中国共产党的正确政策及其所领导的革命斗争的胜利发展，促使民族资产阶级放弃了第三条道路。' },
            { title: '鸦片战争以后，中华民族面临的两大历史任务是', answer: 'CD', options: 'A.反对官僚资本主义 B.消灭资产阶级 C.推翻帝国主义和封建主义在中国的反动统治，求得民族独立和人民解放 D.实现国家繁荣富强和人民共同富裕' },
            { title: '中国共产党实现革命统一战线的基本原则和主要经验是', answer: 'ABCD', options: 'A.无产阶级力争并牢牢掌握统一战线的领导权 B.在统一战线中实现发展进步势力，争取中间势力，孤立顽固势力的政策 C.针对中国资产阶级的特点，实现又联合又斗争的政策 D.统一战线必须以工农联盟为基础，以武装斗争为支柱，才能巩固和发展' },
            { title: '土地革命战争时期，中国的红色政权能够存在与发展的主观条件有', answer: 'CD', options: 'A.几个帝国主义国家间接统治的政治经济发展不平衡的半殖民地半封建的大国 B.全国革命形势的继续向前发展 C.相当力量的正式红军的存在 D.共产党组织的有力量和它的政策的正确' },
            { title: '新民主主义革命就是"新式的特殊的资产阶级民主主义革命"，它的基本特点是', answer: 'ABCD', options: 'A.有新的领导阶级即无产阶级 B.有新的指导思想即马克思主义 C.它属于世界无产阶级革命的一部分 D.它有了新的前途，经过新民主主义革命进而达到社会主义的目标' },
            { title: '1949年3月，毛泽东在中共七届二中全会上提出的"两个务必"是指', answer: 'CD', options: 'A.居安思危，增强忧患意识 B.保持同人民群众的血肉联系 C.保持谦虚、谨慎、不骄、不躁的作风 D.保持艰苦奋斗的作风' },
            { title: '党在长期斗争中形成的三大优良作风', answer: 'ABD', options: 'A.理论联系实际 B.密切联系群众 C.为人民服务 D.批评与自我批评' },
            { title: '新民主主义的经济纲领', answer: 'ABD', options: 'A.没收封建地主阶级的土地归农民所有 B.没收官僚资本为新民主主义国家所有 C.公私兼顾，劳资两利 D.保护民族工商业' },
            { title: '中国共产党在中国革命中战胜敌人的"主要法宝"有', answer: 'BCD', options: 'A.群众路线 B.统一战线 C.武装斗争 D.党的建设' }
        ];
        multi3.forEach(item => addMultiple(item.title, item.answer, item.options));

        // ============================================================
        // 第四章 社会主义改造理论 (单选 + 多选)
        // ============================================================

        const single4 = [
            ['中国对资本主义工商业的社会主义改造是通过（ ）这一过渡形式实现的。', 'B', 'A.限制 B.国家资本主义 C.协商 D.合作社'],
            ['消灭剥削的物质前提是', 'A', 'A.实行社会主义公有制 B.实行按劳分配 C.实行人民民主专政 D.生产力高度发达'],
            ['在社会主义改造基本完成以后，正确处理人民内部矛盾成为国家政治生活的主题。中国共产党提出的正确处理人民内部矛盾的方针政策中不包括的是', 'B', 'A.统筹兼顾，适当安排 B.有理、有利、有节 C.百花齐放，百家争鸣 D.长期共存，互相监督'],
            ['在农业社会主义改造中建立的初级农业生产合作社属于', 'C', 'A.新民主主义性质 B.社会主义萌芽性质 C.半社会主义性质 D.社会主义性质'],
            ['在我国，剥削阶级和剥削制度被消灭的标志是', 'C', 'A.中华人民共和国建立 B.全国大陆的统一 C.社会主义改造的完成 D.土地改革的完成'],

            { title: '社会主义时期统一战线对象包括', answer: 'ABC', options: 'A.全体社会主义劳动者 B.拥护社会主义的爱国者 C.拥护祖国统一的爱国者 D.与我国有联系的外籍华人' },
            { title: '社会主义时期爱国统一战线具有', answer: 'BCD', options: 'A.领导的功能 B.团结的功能 C.沟通的功能 D.协调的功能' },
            { title: '人民军队是', answer: 'ABCD', options: 'A.人民民主专政的坚强柱石 B.捍卫社会主义祖国的坚强长城 C.建设有中国特色社会主义事业的重要力量 D.改革开放和现代化建设的坚强后盾' },
            { title: '建设有中国特色的社会主义，必须加强民族团结，因为', answer: 'BCD', options: 'A.民族问题实质上是阶级问题 B.我国社会主义初级阶段仍将长期存在着民族问题 C.它关系到祖国的统一和边防的巩固 D.它关系到社会主义现代化建设的成败' },
            { title: '我国社会主义初级阶段仍将长期存在民族问题，决定我国民族工作的长期性、复杂性和重要性的因素有', answer: 'BCD', options: 'A.民族斗争实质上是阶级斗争 B.各民族经济文化上的差异性和发展的不平衡 C.资产阶级民族主义思想影响和历史遗留下来的民族隔阂的长期存在 D.利用民族问题仍然是西方敌对势力对我国进行"分化"、"西化"和各种颠覆破坏活动的重要手段' },
            { title: '改革开放以来，成为中国特色社会主义事业依靠力量的新的社会阶层主要有', answer: 'ABCD', options: 'A.民营科技企业的创业人员和技术人员 B.受聘于外资企业的管理技术人员 C.私营企业主 D.中介组织的从业人员' },
            { title: '我国社会主义建设的基本依靠力量是', answer: 'BCD', options: 'A.中国共产党 B.工人 C.农民 D.知识分子' }
        ];
        multi14.forEach(item => addMultiple(item.title, item.answer, item.options));

        // ============================================================
        // 第十五章 中国特色社会主义事业的领导核心 (单选 + 多选)
        // ============================================================

        const single15 = [
            ['中国共产党的宗旨是', 'A', 'A.全心全意为人民服务 B.民主集中制 C.中国工人阶级的先锋队 D.中国人民和中华民族的先锋队'],
            ['中国共产党的最大政治优势是', 'A', 'A.密切联系群众 B.批评与自我批评 C.实事求是 D.艰苦奋斗'],
            ['新世纪的"新的伟大"工程是指', 'B', 'A.祖国统一 B.党的建设 C.现代化建设 D.反腐败斗争'],
            ['我们党全部工作的出发点和落脚点是', 'D', 'A."三个代表"重要思想 B.全面建设小康社会 C.坚持与时俱进 D.不断维护好、发展好最广大人民的根本利益'],
            ['社会主义现代化建设的根本保证是', 'B', 'A.加强民主政治建设 B.加强中国共产党的领导 C.坚持走社会主义道路 D.以马列主义、毛泽东思想、邓小平理论、"三个代表"重要思想、科学发展观为指导'],
            ['江泽民提出，党执政后的最大危险是', 'B', 'A.腐败 B.脱离群众 C.脱离实际 D.思想僵化'],
            ['改革领导体制，关键是要', 'D', 'A.完善人民代表大会制度 B.实行民主集中制 C.坚持人民民主专政 D.正确处理党政关系']
        ];
        single15.forEach(item => addSingle(item[0], item[1], item[2]));

        const multi15 = [
            { title: '新时期，我们党必须解决好的历史性课题是', answer: 'BD', options: 'A.改进党的思想作风 B.提高党的领导水平和执政水平 C.推进经济社会发展 D.提高拒腐防变和抵御风险的能力' },
            { title: '在新阶段，把党的建设作为一个系统工程来抓，就是要把党的( )建设作为主线。', answer: 'BC', options: 'A.制度 B.执政能力 C.先进性 D.思想' }
        ];
        multi15.forEach(item => addMultiple(item.title, item.answer, item.options));

        // ============================================================
        // 重置id & 启动
        // ============================================================
        questions.forEach((q, idx) => q.id = idx + 1);
        const total = questions.length;
        document.getElementById('totalBadge').textContent = `共 ${total} 题`;

        let currentIdx = 0;
        const qArea = document.getElementById('questionArea');
        const progressText = document.getElementById('progressText');
        const progressFill = document.getElementById('progressFill');
        const starBtn = document.getElementById('starBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const randomBtn = document.getElementById('randomBtn');
        const jumpInput = document.getElementById('jumpInput');
        const jumpBtn = document.getElementById('jumpBtn');

        function renderQuestion(index) {
            try {
                if (!questions || questions.length === 0) {
                    qArea.innerHTML = '<div class="error-msg">题库为空</div>';
                    return;
                }
                const q = questions[index];
                if (!q) {
                    qArea.innerHTML = `<div class="error-msg">题目 ${index+1} 不存在</div>`;
                    return;
                }

                progressText.textContent = `${index + 1} / ${total}`;
                progressFill.style.width = `${((index + 1) / total) * 100}%`;
                updateStarBtn(q);

                let html = '';
                const typeMap = { single: '单选题', multiple: '多选题' };
                const typeClass = q.type || 'single';
                html += `<span class="q-type ${typeClass}">${typeMap[typeClass] || '题目'}</span>`;
                html += `<div class="q-title">${q.title || '（题目内容为空）'}</div>`;

                if (q.options && q.options.length > 0) {
                    html += `<div class="options">`;
                    const labels = 'ABCDEFGHIJKLMN'.split('');
                    q.options.forEach((opt, idx) => {
                        const label = labels[idx] || '?';
                        const isCorrect = q._revealed && q.answer && q.answer.includes(label);
                        const isWrong = q._revealed && q.answer && !q.answer.includes(label) && q._selected && q._selected.includes(label);
                        let cls = 'option-item';
                        if (q._revealed) {
                            cls += ' disabled';
                            if (isCorrect) cls += ' correct';
                            if (isWrong) cls += ' wrong';
                        }
                        html += `<div class="${cls}" data-opt="${label}" data-qid="${q.id}">
                                    <span class="opt-label">${label}.</span>
                                    <span>${opt.replace(/^[A-Z]\./, '').trim()}</span>
                                 </div>`;
                    });
                    html += `</div>`;
                }

                if (q.options && q.options.length > 0 && q._revealed) {
                    html += `<div class="answer-box show"><span class="ans-label">✅ 正确答案</span><span class="ans-content">${q.answer}</span></div>`;
                }

                qArea.innerHTML = html;

                // 选择题点击
                if (q.options && q.options.length > 0) {
                    const optItems = qArea.querySelectorAll('.option-item:not(.disabled)');
                    optItems.forEach(el => {
                        el.addEventListener('click', function() {
                            if (q._revealed) return;
                            const label = this.dataset.opt;
                            if (!q._selected) q._selected = [];
                            if (q.type === 'single') {
                                q._selected = [label];
                            } else {
                                const idx = q._selected.indexOf(label);
                                if (idx > -1) q._selected.splice(idx, 1);
                                else q._selected.push(label);
                            }
                            q._revealed = true;
                            renderQuestion(index);
                        });
                    });
                }

                prevBtn.disabled = index === 0;
                nextBtn.disabled = index === total - 1;
                jumpInput.value = index + 1;
                jumpInput.max = total;
            } catch (e) {
                qArea.innerHTML = `<div class="error-msg">渲染出错：${e.message}</div>`;
                console.error(e);
            }
        }

        function updateStarBtn(q) {
            if (q.collected) {
                starBtn.textContent = '★';
                starBtn.classList.add('active');
            } else {
                starBtn.textContent = '☆';
                starBtn.classList.remove('active');
            }
        }
        starBtn.addEventListener('click', function() {
            const q = questions[currentIdx];
            q.collected = !q.collected;
            updateStarBtn(q);
        });

        function goTo(index) {
            if (index < 0 || index >= total) return;
            currentIdx = index;
            renderQuestion(currentIdx);
            document.querySelector('.app').scrollTop = 0;
        }

        prevBtn.addEventListener('click', () => goTo(currentIdx - 1));
        nextBtn.addEventListener('click', () => goTo(currentIdx + 1));
        randomBtn.addEventListener('click', () => {
            const randomIdx = Math.floor(Math.random() * total);
            goTo(randomIdx);
        });
        jumpBtn.addEventListener('click', function() {
            let val = parseInt(jumpInput.value);
            if (isNaN(val) || val < 1) val = 1;
            if (val > total) val = total;
            goTo(val - 1);
        });
        jumpInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') jumpBtn.click();
        });
        document.addEventListener('keydown', function(e) {
            if (e.target.tagName === 'INPUT') return;
            if (e.key === 'ArrowLeft') prevBtn.click();
            else if (e.key === 'ArrowRight') nextBtn.click();
        });

        renderQuestion(0);
    })();
</script>
</body>
</html>
