<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>毛概 · 背诵快闪卡片</title>
    <style>
        /* === 全局重置 & 基础 === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', system-ui, -apple-system, sans-serif;
            background: #f5f0eb;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background-image: radial-gradient(circle at 10% 20%, rgba(180, 40, 40, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 90% 80%, rgba(180, 40, 40, 0.05) 0%, transparent 50%);
        }

        /* === 主容器 === */
        .app-container {
            width: 100%;
            max-width: 780px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 30px 30px 24px;
            box-shadow: 0 25px 60px rgba(120, 40, 40, 0.18), 0 8px 24px rgba(0, 0, 0, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: all 0.3s;
        }

        /* === 头部 === */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo {
            font-size: 22px;
            font-weight: 700;
            color: #a02828;
            letter-spacing: 0.5px;
            background: rgba(180, 40, 40, 0.08);
            padding: 4px 16px 4px 14px;
            border-radius: 40px;
            border-left: 4px solid #a02828;
        }

        .logo span {
            color: #5a2d2d;
            font-weight: 400;
            font-size: 14px;
            margin-left: 6px;
        }

        .header-actions {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn-icon {
            background: rgba(160, 40, 40, 0.07);
            border: 1px solid rgba(160, 40, 40, 0.12);
            border-radius: 30px;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: 500;
            color: #4a2a2a;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: inherit;
        }

        .btn-icon:hover {
            background: rgba(160, 40, 40, 0.14);
            border-color: rgba(160, 40, 40, 0.25);
            transform: translateY(-1px);
        }

        .btn-icon:active {
            transform: scale(0.96);
        }

        .btn-icon.active {
            background: #a02828;
            color: #fff;
            border-color: #a02828;
        }

        .btn-icon.active:hover {
            background: #8a1f1f;
        }

        .btn-icon .badge {
            background: rgba(255, 255, 255, 0.25);
            border-radius: 20px;
            padding: 0 8px;
            font-size: 12px;
            font-weight: 600;
        }
        .btn-icon.active .badge {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        /* === 进度条 === */
        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(160, 40, 40, 0.12);
            border-radius: 4px;
            margin-bottom: 18px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #a02828, #c0392b);
            border-radius: 4px;
            transition: width 0.35s ease;
            width: 0%;
        }

        .progress-text {
            position: absolute;
            right: 0;
            top: -18px;
            font-size: 12px;
            color: #7a5a5a;
            font-weight: 500;
        }

        /* === 卡片区域 === */
        .card-wrapper {
            perspective: 1200px;
            margin: 8px 0 18px;
            min-height: 420px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            width: 100%;
            min-height: 380px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            cursor: pointer;
            border-radius: 28px;
            box-shadow: 0 8px 32px rgba(80, 30, 30, 0.10);
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            min-height: 380px;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: 28px;
            padding: 32px 34px 28px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
        }

        .card-front {
            background: linear-gradient(145deg, #ffffff, #fcf8f6);
            align-items: center;
            text-align: center;
            border: 1px solid rgba(160, 40, 40, 0.10);
        }

        .card-front .card-tag {
            font-size: 12px;
            font-weight: 600;
            color: #a02828;
            background: rgba(160, 40, 40, 0.08);
            padding: 4px 14px;
            border-radius: 30px;
            letter-spacing: 0.3px;
            margin-bottom: 16px;
            display: inline-block;
        }

        .card-front .question {
            font-size: 23px;
            font-weight: 700;
            color: #2d1a1a;
            line-height: 1.6;
            max-width: 90%;
            margin: 0 auto;
        }

        .card-front .hint-flip {
            margin-top: 28px;
            font-size: 14px;
            color: #a08080;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(160, 40, 40, 0.04);
            padding: 6px 18px;
            border-radius: 40px;
            border: 1px dashed rgba(160, 40, 40, 0.10);
        }

        .card-front .hint-flip svg {
            opacity: 0.5;
        }

        .card-back {
            background: linear-gradient(145deg, #fcf8f6, #f5ede8);
            transform: rotateY(180deg);
            align-items: flex-start;
            text-align: left;
            overflow-y: auto;
            border: 1px solid rgba(160, 40, 40, 0.08);
        }

        .card-back::-webkit-scrollbar {
            width: 4px;
        }
        .card-back::-webkit-scrollbar-track {
            background: transparent;
        }
        .card-back::-webkit-scrollbar-thumb {
            background: rgba(160, 40, 40, 0.20);
            border-radius: 10px;
        }

        .card-back .back-content {
            width: 100%;
            font-size: 15.5px;
            line-height: 1.8;
            color: #2d1a1a;
        }

        .card-back .back-content strong {
            color: #a02828;
            font-weight: 700;
        }

        .card-back .back-content .section-title {
            display: block;
            font-weight: 700;
            font-size: 17px;
            color: #3d1f1f;
            margin: 10px 0 4px;
            border-bottom: 2px solid rgba(160, 40, 40, 0.10);
            padding-bottom: 4px;
        }

        .card-back .back-content .section-title:first-of-type {
            margin-top: 0;
        }

        .card-back .back-content ul,
        .card-back .back-content .list {
            padding-left: 20px;
            margin: 6px 0 8px;
        }

        .card-back .back-content li,
        .card-back .back-content .list-item {
            margin-bottom: 4px;
            list-style-type: none;
            position: relative;
            padding-left: 18px;
        }

        .card-back .back-content li::before,
        .card-back .back-content .list-item::before {
            content: "•";
            color: #a02828;
            font-weight: 700;
            position: absolute;
            left: 0;
        }

        .card-back .back-content .highlight-box {
            background: rgba(160, 40, 40, 0.05);
            border-left: 3px solid #a02828;
            padding: 10px 16px;
            border-radius: 0 8px 8px 0;
            margin: 8px 0;
        }

        .card-back .back-content .memorize {
            background: rgba(160, 40, 40, 0.07);
            border-radius: 12px;
            padding: 10px 16px;
            margin: 10px 0 0;
            font-weight: 600;
            color: #3d1f1f;
            border: 1px solid rgba(160, 40, 40, 0.08);
        }

        .card-back .back-content .memorize::before {
            content: "📌 ";
        }

        /* === 底部控制栏 === */
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 6px;
            gap: 10px;
            flex-wrap: wrap;
        }

        .controls .nav-group {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .btn-nav {
            background: rgba(160, 40, 40, 0.06);
            border: 1px solid rgba(160, 40, 40, 0.10);
            border-radius: 40px;
            padding: 10px 18px;
            font-size: 14px;
            font-weight: 500;
            color: #3d2a2a;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 4px;
            min-width: 72px;
            justify-content: center;
        }

        .btn-nav:hover:not(:disabled) {
            background: rgba(160, 40, 40, 0.12);
            border-color: rgba(160, 40, 40, 0.20);
        }

        .btn-nav:active:not(:disabled) {
            transform: scale(0.95);
        }

        .btn-nav:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .btn-nav .arrow {
            font-size: 18px;
            line-height: 1;
        }

        .btn-fav {
            background: rgba(160, 40, 40, 0.06);
            border: 1px solid rgba(160, 40, 40, 0.10);
            border-radius: 40px;
            padding: 10px 18px;
            font-size: 14px;
            font-weight: 500;
            color: #3d2a2a;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-fav:hover {
            background: rgba(160, 40, 40, 0.12);
            border-color: rgba(160, 40, 40, 0.20);
        }

        .btn-fav.active {
            background: #a02828;
            color: #fff;
            border-color: #a02828;
        }

        .btn-fav.active:hover {
            background: #8a1f1f;
        }

        .btn-fav svg {
            flex-shrink: 0;
        }

        .counter {
            font-size: 14px;
            color: #7a5a5a;
            font-weight: 500;
            background: rgba(160, 40, 40, 0.04);
            padding: 4px 14px;
            border-radius: 30px;
            white-space: nowrap;
            min-width: 60px;
            text-align: center;
        }

        /* === 空状态 === */
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: #7a5a5a;
        }
        .empty-state .emoji {
            font-size: 48px;
            margin-bottom: 12px;
        }
        .empty-state p {
            font-size: 16px;
            line-height: 1.6;
        }

        /* === 响应式 === */
        @media (max-width: 600px) {
            .app-container {
                padding: 18px 16px 16px;
                border-radius: 32px;
            }
            .card {
                min-height: 300px;
            }
            .card-face {
                min-height: 300px;
                padding: 24px 20px 20px;
            }
            .card-front .question {
                font-size: 19px;
            }
            .card-back .back-content {
                font-size: 14px;
                line-height: 1.7;
            }
            .logo {
                font-size: 17px;
                padding: 2px 12px 2px 10px;
            }
            .logo span {
                font-size: 12px;
            }
            .btn-icon {
                font-size: 12px;
                padding: 6px 12px;
            }
            .btn-nav {
                padding: 8px 12px;
                font-size: 13px;
                min-width: 56px;
            }
            .btn-fav {
                padding: 8px 12px;
                font-size: 13px;
            }
            .counter {
                font-size: 12px;
                padding: 2px 10px;
                min-width: 48px;
            }
            .controls {
                gap: 6px;
            }
            .header {
                margin-bottom: 12px;
            }
            .card-front .hint-flip {
                font-size: 12px;
                padding: 4px 14px;
                margin-top: 20px;
            }
            .card-back .back-content .section-title {
                font-size: 15px;
            }
        }

        @media (max-width: 400px) {
            .app-container {
                padding: 12px 10px 12px;
                border-radius: 24px;
            }
            .card-face {
                padding: 18px 14px 16px;
                min-height: 260px;
            }
            .card {
                min-height: 260px;
            }
            .card-front .question {
                font-size: 17px;
            }
            .card-back .back-content {
                font-size: 13px;
            }
            .btn-nav {
                padding: 6px 10px;
                font-size: 12px;
                min-width: 44px;
            }
            .btn-nav .arrow {
                font-size: 16px;
            }
            .btn-fav {
                padding: 6px 10px;
                font-size: 12px;
            }
            .counter {
                font-size: 11px;
                padding: 2px 8px;
                min-width: 40px;
            }
            .logo {
                font-size: 15px;
            }
            .header-actions .btn-icon {
                font-size: 11px;
                padding: 4px 10px;
            }
        }

        /* === 进入动画 === */
        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(18px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card-wrapper {
            animation: fadeSlideUp 0.4s ease forwards;
        }

        /* 收藏按钮小圆点 */
        .fav-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #a02828;
            margin-left: 4px;
            transition: all 0.2s;
        }
        .fav-dot.hidden {
            opacity: 0;
            transform: scale(0.5);
        }
    </style>
</head>
<body>

<a href="index.html" style="display:block;text-align:center;padding:10px;background:#eee;text-decoration:none;color:#222;border-radius:8px;margin:10px auto;max-width:600px;">← 返回导航首页</a>

    <div class="app-container" id="app">
        <!-- 头部 -->
        <div class="header">
            <div class="header-left">
                <div class="logo">📖 毛概 <span>快闪卡片</span></div>
            </div>
            <div class="header-actions">
                <button class="btn-icon" id="toggleShuffle" title="重新随机排列">

                </button>

        <div class="card-wrapper" id="cardWrapper">

                        点击翻转
                    </div>
                </div>

        <!-- 底部控制 -->
        <div class="controls">
            <div class="nav-group">
                <button class="btn-nav" id="prevBtn" title="上一题">
                    <span class="arrow">‹</span> 上一题
                </button>
                <button class="btn-nav" id="nextBtn" title="下一题">
                    下一题 <span class="arrow">›</span>

                </button>
                <span class="counter" id="counterDisplay">1 / 20</span>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        //  1. 卡片数据（从文档中精炼提取）
        // ============================================================
        const CARD_DATA = [{
            id: 1,
            tag: '过渡时期总路线',
            front: '党在过渡时期总路线的完整表述是什么？',
            back: `
          <span class="section-title">📌 完整表述</span>
          <div class="highlight-box">
            <strong>"党在这个过渡时期的总路线和总任务，是要在一个相当长的时期内，逐步实现国家的社会主义工业化，并逐步实现国家对农业、对手工业和对资本主义工商业的社会主义改造。"</strong>

          </div>
          <div class="memorize">一化是主体，三改是两翼；工业化是目标，改造是手段。</div>
        `
        }, {
            id: 2,
            tag: '过渡时期总路线',
            front: '过渡时期总路线的提出依据有哪些？',
            back: `
          <span class="section-title">📌 提出依据（四方面）</span>
          <div class="list">
            <div class="list-item"><strong>① 理论依据：</strong>马克思列宁主义关于过渡时期的学说 — 无产阶级专政下利用国家政权力量，逐步消灭私有制，建立社会主义经济基础。</div>

          </div>
          <div class="memorize">理论有来源，国情有急需，工业化是目标，改造是手段。</div>
        `
        }, {
            id: 3,
            tag: '过渡时期总路线',
            front: '"一化三改"的具体内容及相互关系是什么？',
            back: `
          <span class="section-title">📌 「一化」 — 社会主义工业化</span>
          <div>指建立强大的重工业基础，为国家现代化提供物质前提，是总路线的<strong>「主体」</strong>。</div>
          <span class="section-title">📌 「三改」 — 三大改造</span>
          <div class="list">
            <div class="list-item">对<strong>个体农业</strong>的社会主义改造</div>
            <div class="list-item">对<strong>个体手工业</strong>的社会主义改造</div>
            <div class="list-item">对<strong>资本主义工商业</strong>的社会主义改造</div>

          <div>三改是总路线的<strong>「两翼」</strong>，旨在变革生产关系，确立社会主义公有制。</div>

          </div>
        `
        }, {
            id: 4,
            tag: '改造道路',
            front: '适合中国特色社会主义的改造道路有哪些核心原则？',
            back: `
          <span class="section-title">📌 四条核心原则</span>

        function loadFavorites() {
            try {
                const saved = localStorage.getItem('maogai_favorites');
                if (saved) {
                    const arr = JSON.parse(saved);
                    state.favorites = new Set(arr);
                }
            } catch (_) { /* ignore */ }
            updateFavCount();
        }

        // 保存收藏到 localStorage
        function saveFavorites() {
            try {
                localStorage.setItem('maogai_favorites', JSON.stringify([...state.favorites]));
            } catch (_) { /* ignore */ }
            updateFavCount();
        }

        function updateFavCount() {
            const count = state.favorites.size;
            favCount.textContent = count;
            // 更新收藏视图按钮样式
            if (state.favView && count === 0) {
                // 如果收藏视图为空，自动退出收藏视图
                state.favView = false;
                toggleFavView.classList.remove('active');
                rebuildCardList();
            }
        }

        // 判断当前卡片是否已收藏
        function isCurrentFav() {
            if (!state.cards.length) return false;
            const card = state.cards[state.currentIndex];
            return card && state.favorites.has(card.id);
        }

        // 更新收藏按钮状态
        function updateFavButton() {
            const fav = isCurrentFav();
            favBtn.classList.toggle('active', fav);
            favBtn.innerHTML = `
            <svg width="18" height="18" viewBox="0 0 24 24" fill="${fav ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
            ${fav ? '已收藏' : '收藏'}
          `;
        }

        // 切换收藏
        function toggleFavorite() {
            if (!state.cards.length) return;
            const card = state.cards[state.currentIndex];
            if (!card) return;
            if (state.favorites.has(card.id)) {
                state.favorites.delete(card.id);
            } else {
                state.favorites.add(card.id);
            }
            saveFavorites();
            updateFavButton();
            updateFavCount();
            // 如果处于收藏视图且当前卡片被取消收藏，需要刷新列表
            if (state.favView) {
                rebuildCardList();
            }
        }

        // 随机打乱数组（Fisher–Yates）
        function shuffleArray(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        // 重建卡片列表（根据当前视图和排序）
        function rebuildCardList() {
            let list = [...state.allCards];

            if (state.favView) {
                list = list.filter(c => state.favorites.has(c.id));
                if (list.length === 0) {
                    // 没有收藏卡片，显示空状态
                    showEmptyState();
                    return;
                }
            }

            if (state.shuffled) {
                list = shuffleArray(list);
            }

            state.cards = list;
            state.currentIndex = 0;
            state.isFlipped = false;
            cardEl.classList.remove('flipped');
            renderCard();
            updateProgress();
            updateButtons();
            updateFavButton();
        }

        // 显示空状态
        function showEmptyState() {
            state.cards = [];
            state.currentIndex = 0;
            state.isFlipped = false;
            cardEl.classList.remove('flipped');
            // 显示空状态
            questionText.textContent = '暂无收藏卡片';
            cardTag.textContent = '💡 提示';
            answerContent.innerHTML = `
            <div class="empty-state">
              <div class="emoji">📭</div>
              <p>还没有收藏任何卡片。<br>点击卡片下方的 ⭐ 收藏按钮，将重点题目收藏起来反复记忆。</p>
              <p style="margin-top:12px;font-size:14px;color:#a08080;">点击右上角「收藏」按钮可退出收藏视图。</p>
            </div>
          `;
            progressFill.style.width = '0%';
            progressText.textContent = '0 / 0';
            counterDisplay.textContent = '0 / 0';
            prevBtn.disabled = true;
            nextBtn.disabled = true;
            favBtn.classList.remove('active');
            favBtn.innerHTML = `
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
            收藏
          `;
            // 重置进度条颜色
            progressFill.style.width = '0%';
        }

        // 渲染当前卡片
        function renderCard() {
            if (!state.cards.length) {
                showEmptyState();
                return;
            }

            const card = state.cards[state.currentIndex];
            if (!card) return;

            // 正面
            cardTag.textContent = card.tag;
            questionText.textContent = card.front;

            // 背面
            answerContent.innerHTML = card.back;

            // 重置翻转状态
            cardEl.classList.remove('flipped');
            state.isFlipped = false;

            updateProgress();
            updateButtons();
            updateFavButton();
        }

        // 更新进度
        function updateProgress() {
            const total = state.cards.length;
            const current = total === 0 ? 0 : state.currentIndex + 1;
            const percent = total === 0 ? 0 : (current / total) * 100;
            progressFill.style.width = `${percent}%`;
            const text = total === 0 ? '0 / 0' : `${current} / ${total}`;
            progressText.textContent = text;
            counterDisplay.textContent = text;
        }

        // 更新按钮状态
        function updateButtons() {
            const total = state.cards.length;
            prevBtn.disabled = total === 0 || state.currentIndex === 0;
            nextBtn.disabled = total === 0 || state.currentIndex === total - 1;
        }

        // 翻转卡片
        function flipCard() {
            if (!state.cards.length) return;
            state.isFlipped = !state.isFlipped;
            cardEl.classList.toggle('flipped', state.isFlipped);
        }

        // 上一题
        function prevCard() {
            if (state.currentIndex > 0) {
                state.currentIndex--;
                state.isFlipped = false;
                cardEl.classList.remove('flipped');
                renderCard();
            }
        }

        // 下一题
        function nextCard() {
            if (state.currentIndex < state.cards.length - 1) {
                state.currentIndex++;
                state.isFlipped = false;
                cardEl.classList.remove('flipped');
                renderCard();
            }
        }

        // ============================================================
        //  4. 初始化 & 事件绑定
        // ============================================================

        function init() {
            // 复制原始数据
            state.allCards = CARD_DATA.map(c => ({ ...c }));

            // 加载收藏
            loadFavorites();

            // 默认随机排列
            state.shuffled = true;
            toggleShuffle.classList.add('active');

            // 构建列表
            rebuildCardList();

            // === 事件绑定 ===

            // 点击卡片翻转
            cardEl.addEventListener('click', (e) => {
                // 如果点击的是按钮或链接，不触发翻转
                if (e.target.closest('button') || e.target.closest('a')) return;
                flipCard();
            });

            // 上一题
            prevBtn.addEventListener('click', prevCard);

            // 下一题
            nextBtn.addEventListener('click', nextCard);

            // 收藏
            favBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                toggleFavorite();
            });

            // 键盘快捷键
            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowLeft') prevCard();
                if (e.key === 'ArrowRight') nextCard();
                if (e.key === ' ' || e.key === 'Enter') {
                    e.preventDefault();
                    flipCard();
                }
                if (e.key === 'f' || e.key === 'F') {
                    e.preventDefault();
                    toggleFavorite();
                }
            });

            // 随机排列切换
            toggleShuffle.addEventListener('click', () => {
                state.shuffled = !state.shuffled;
                toggleShuffle.classList.toggle('active', state.shuffled);
                if (state.favView) {
                    // 如果在收藏视图，重新排列收藏列表
                    rebuildCardList();
                } else {
                    rebuildCardList();
                }
            });

            // 收藏视图切换
            toggleFavView.addEventListener('click', () => {
                state.favView = !state.favView;
                toggleFavView.classList.toggle('active', state.favView);
                if (state.favView && state.favorites.size === 0) {
                    // 没有收藏卡片，自动退出
                    state.favView = false;
                    toggleFavView.classList.remove('active');
                    rebuildCardList();
                    // 给个提示
                    setTimeout(() => {
                        alert('📭 还没有收藏任何卡片，请先收藏一些题目吧！');
                    }, 100);
                    return;
                }
                rebuildCardList();
            });

            // 处理收藏视图按钮的初始状态
            if (state.favView) {
                toggleFavView.classList.add('active');
            }

            // 触屏设备：双击翻转
            let lastTap = 0;
            document.addEventListener('touchend', (e) => {
                const now = Date.now();
                if (now - lastTap < 300 && e.target.closest('.card')) {
                    flipCard();
                }
                lastTap = now;
            });
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', init);
    </script>

</body>
