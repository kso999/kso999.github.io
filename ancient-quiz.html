<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>魏晋南北朝文学 · 刷题页</title>
    <style>
        /* 全局重置 & 基础 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', Roboto, 'Helvetica Neue', sans-serif;
            background: #f5f3f0;
            color: #2c2c2c;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .app {
            max-width: 820px;
            width: 100%;
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08), 0 8px 20px rgba(0, 0, 0, 0.04);
            padding: 32px 36px 28px;
            transition: all 0.2s;
        }

        /* 顶栏 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-back {
            background: transparent;
            border: none;
            font-size: 20px;
            font-weight: 500;
            color: #7a6a5a;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 30px;
            transition: background 0.15s, color 0.15s;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .btn-back:hover {
            background: #f0ede9;
            color: #3d2c1b;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: #3d2c1b;
        }

        .header h1 small {
            font-weight: 400;
            font-size: 15px;
            color: #8a7a6a;
            margin-left: 10px;
        }

        .progress {
            font-size: 15px;
            color: #7a6a5a;
            background: #f0ede9;
            padding: 4px 16px;
            border-radius: 40px;
            font-weight: 500;
        }

        /* 题目卡片 */
        .question-card {
            background: #fcfbf9;
            border-radius: 18px;
            padding: 24px 28px 20px;
            border: 1px solid #ede8e2;
            min-height: 280px;
            display: flex;
            flex-direction: column;
        }

        .q-badge {
            display: inline-block;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.3px;
            color: #fff;
            background: #b8a392;
            padding: 2px 14px;
            border-radius: 30px;
            margin-bottom: 14px;
            align-self: flex-start;
        }

        .q-badge.type-choice {
            background: #6b8c9e;
        }
        .q-badge.type-fill {
            background: #9b8b7a;
        }
        .q-badge.type-recite {
            background: #a67c6b;
        }
        .q-badge.type-short {
            background: #7d8f7a;
        }

        .q-text {
            font-size: 18px;
            line-height: 1.7;
            font-weight: 500;
            margin-bottom: 18px;
            color: #2d241c;
        }

        .q-text .highlight {
            color: #a5583a;
            font-weight: 600;
        }

        /* 选项 (选择题) */
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 4px;
        }

        .option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            background: #f6f3ef;
            border-radius: 12px;
            cursor: pointer;
            border: 1.5px solid transparent;
            transition: all 0.15s;
            font-size: 16px;
            color: #3d322a;
        }

        .option:hover {
            background: #ede8e1;
        }

        .option.selected {
            border-color: #b8a392;
            background: #f0ebe4;
        }

        .option .letter {
            font-weight: 600;
            color: #7a6a5a;
            min-width: 24px;
        }

        .option input[type="radio"] {
            display: none;
        }

        /* 输入框 (填空/背诵/简答) */
        .input-area {
            margin-top: 6px;
        }

        .input-area textarea,
        .input-area input[type="text"] {
            width: 100%;
            padding: 14px 18px;
            font-size: 16px;
            border: 1.5px solid #e2dad2;
            border-radius: 14px;
            background: #faf8f6;
            font-family: inherit;
            transition: border 0.15s;
            resize: vertical;
            color: #2d241c;
        }

        .input-area textarea:focus,
        .input-area input[type="text"]:focus {
            outline: none;
            border-color: #b8a392;
            background: #fff;
        }

        .input-area textarea {
            min-height: 100px;
        }

        .input-area input[type="text"] {
            height: 52px;
        }

        .hint-text {
            font-size: 14px;
            color: #9a8a7a;
            margin-top: 8px;
            font-weight: 400;
        }

        /* 答案 & 解析 */
        .answer-box {
            margin-top: 20px;
            padding: 18px 20px;
            background: #f2ede7;
            border-radius: 14px;
            border-left: 5px solid #b8a392;
            display: none;
            animation: fadeSlide 0.25s ease;
        }

        .answer-box.show {
            display: block;
        }

        .answer-box .ans-label {
            font-weight: 600;
            font-size: 14px;
            color: #5a4a3a;
            margin-bottom: 4px;
        }

        .answer-box .ans-content {
            font-size: 16px;
            line-height: 1.7;
            color: #2d241c;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .answer-box .ans-content strong {
            color: #a5583a;
        }

        .answer-box .explain {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px dashed #d5ccc2;
            font-size: 15px;
            color: #4d3d32;
        }

        .answer-box .explain strong {
            color: #6b5a4a;
        }

        @keyframes fadeSlide {
            0% {
                opacity: 0;
                transform: translateY(-6px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 底部按钮组 */
        .footer-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 24px;
        }

        .nav-group {
            display: flex;
            gap: 10px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 22px;
            border: none;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 500;
            background: #ede8e2;
            color: #3d322a;
            cursor: pointer;
            transition: all 0.15s;
            gap: 6px;
            font-family: inherit;
        }

        .btn:hover {
            background: #e0d8d0;
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-primary {
            background: #b8a392;
            color: #fff;
        }

        .btn-primary:hover {
            background: #a6907e;
        }

        .btn-primary-outline {
            background: transparent;
            border: 1.5px solid #b8a392;
            color: #b8a392;
        }

        .btn-primary-outline:hover {
            background: #b8a392;
            color: #fff;
        }

        .btn-fav {
            background: transparent;
            border: 1.5px solid #d5ccc2;
            color: #7a6a5a;
        }

        .btn-fav:hover {
            border-color: #b8a392;
            background: #f6f3ef;
        }

        .btn-fav.active {
            border-color: #c47a5a;
            background: #f6ede8;
            color: #b85a3a;
        }

        .btn-fav.active:hover {
            background: #f0e2da;
        }

        .btn-answer {
            background: #d5ccc2;
            color: #3d322a;
        }

        .btn-answer:hover {
            background: #c8bdb2;
        }

        .btn-answer.showing {
            background: #b8a392;
            color: #fff;
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
        }

        /* 收藏计数 */
        .fav-count {
            font-size: 14px;
            color: #8a7a6a;
            margin-right: 4px;
        }

        /* 响应式 */
        @media (max-width: 600px) {
            .app {
                padding: 20px 16px;
                border-radius: 20px;
            }
            .question-card {
                padding: 18px 16px;
            }
            .q-text {
                font-size: 16px;
            }
            .header h1 {
                font-size: 18px;
            }
            .header h1 small {
                font-size: 13px;
                display: block;
                margin-left: 0;
                margin-top: 2px;
            }
            .header-left {
                gap: 6px;
            }
            .btn-back {
                font-size: 18px;
                padding: 2px 6px;
            }
            .footer-actions {
                flex-direction: column;
                align-items: stretch;
            }
            .nav-group {
                justify-content: center;
            }
            .btn {
                padding: 8px 16px;
                font-size: 14px;
            }
        }

        /* 滚动条美化 */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f0ede9;
            border-radius: 8px;
        }
        ::-webkit-scrollbar-thumb {
            background: #d5ccc2;
            border-radius: 8px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #b8a392;
        }
    </style>
</head>
<body>

    <div class="app" id="app">
        <!-- 顶栏 -->
        <div class="header">
            <div class="header-left">
                <button class="btn-back" id="backBtn" title="返回主页">← 返回</button>
                <h1>
                    📖 魏晋南北朝文学
                    <small>刷题·背诵</small>
                </h1>
            </div>
            <span class="progress" id="progress">1 / 36</span>
        </div>

        <!-- 题目卡片 -->
        <div class="question-card" id="questionCard">
            <span class="q-badge" id="qBadge">选择题</span>
            <div class="q-text" id="qText"></div>
            <div id="qInteraction"></div>
            <div class="answer-box" id="answerBox">
                <div class="ans-label">📌 答案</div>
                <div class="ans-content" id="ansContent"></div>
            </div>
        </div>

        <!-- 底部按钮 -->
        <div class="footer-actions">
            <div class="nav-group">
                <button class="btn" id="prevBtn" disabled>◀ 上一题</button>
                <button class="btn" id="nextBtn">下一题 ▶</button>
                <button class="btn btn-primary-outline" id="shuffleBtn">🎲 随机</button>
            </div>
            <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:center;">
                <button class="btn btn-fav" id="favBtn">☆ 收藏</button>
                <button class="btn btn-answer" id="answerBtn">📋 显示答案</button>
            </div>
        </div>

        <div style="margin-top:14px; text-align:center; font-size:13px; color:#b0a090; border-top:1px solid #f0ede9; padding-top:14px;">
            <span id="favStats">已收藏 0 题</span>
            &nbsp;·&nbsp; 点击「显示答案」查看解析
        </div>
    </div>

    <script>
        // ============================================================
        //  题 目 数 据  （覆盖文档全部核心内容）
        // ============================================================
        const baseQuestions = [];

        // ----- 辅助函数 -----
        function q(type, question, answer, explanation, options = null, extra = null) {
            return { type, question, answer, explanation, options, extra, fav: false };
        }

        // 1. 选择题 (15题)
        baseQuestions.push(
            q('choice',
                '曹魏时期设立的选官制度是？',
                '九品中正制',
                '曹丕时期设立九品中正制，各州郡设中正官评定士人等级，形成 "上品无寒门，下品无势族" 的社会格局。',
                ['察举制', '九品中正制', '科举制', '世卿世禄制']
            ),
            q('choice',
                '"上品无寒门，下品无势族" 描述的是哪种制度的直接后果？',
                '九品中正制',
                '九品中正制导致士族垄断政治、经济、教育资源，寒门士子长期受压，催生左思、鲍照等人抒发不平的诗作。',
                ['察举制', '九品中正制', '科举制', '门阀制']
            ),
            q('choice',
                '现存最早完整的七言诗是？',
                '曹丕《燕歌行》',
                '曹丕《燕歌行·其一》是现存最早、最完整的七言诗作，以思妇怀远为主题，语言清丽婉转。',
                ['曹操《薤露行》', '曹丕《燕歌行》', '曹植《白马篇》', '王粲《七哀诗》']
            ),
            q('choice',
                '《典论·论文》的作者是谁？这部作品在中国文学史上具有什么地位？',
                '曹丕，是中国最早的文论专篇',
                '曹丕《典论·论文》是中国文学史上第一篇专门的文论作品，提出 "诗赋欲丽" 的观点。',
                ['曹植，是中国最早的山水诗论', '曹丕，是中国最早的文论专篇', '陆机，是系统论述创作的文论', '刘勰，是文学批评的集大成者']
            ),
            q('choice',
                '建安文学的最高成就者是谁？',
                '曹植',
                '曹植是建安文学最高成就者，善用比兴，融叙事、抒情、说理、写景于一体，代表作《白马篇》《赠白马王彪》，开拓游侠、都市、弃妇等题材。',
                ['曹操', '曹丕', '曹植', '王粲']
            ),
            q('choice',
                '"建安七子" 之首是谁？',
                '王粲',
                '王粲为 "建安七子" 之首，其《七哀诗》书写乱世流离、民生苦难，以小场景折射时代浩劫。',
                ['刘桢', '王粲', '孔融', '陈琳']
            ),
            q('choice',
                '以《咏怀诗》八十二首开创五言组诗范式的是？',
                '阮籍',
                '阮籍《咏怀诗》八十二首开创五言组诗范式，大量运用象征、神话、比兴，文意幽深隐晦，"言在耳目之内，情寄八荒之表"。',
                ['嵇康', '阮籍', '山涛', '向秀']
            ),
            q('choice',
                '临刑弹奏《广陵散》的是哪位竹林七贤？',
                '嵇康',
                '嵇康临刑弹奏《广陵散》，其人格崇尚自然，蔑视礼法权贵，散文代表作《与山巨源绝交书》公开反抗虚伪名教。',
                ['阮籍', '嵇康', '向秀', '刘伶']
            ),
            q('choice',
                '"太康之英" 指的是哪位诗人？',
                '陆机',
                '陆机被誉为 "太康之英"，其《文赋》是中国文学史上第一篇系统论述文学创作构思的理论作品，提出 "诗缘情而绮靡"。',
                ['潘岳', '陆机', '左思', '张协']
            ),
            q('choice',
                '"洛阳纸贵" 这一典故与哪部作品有关？',
                '左思《三都赋》',
                '左思耗费十年写成《三都赋》，轰动洛阳，豪贵竞相传抄，导致洛阳纸价上涨，留下 "洛阳纸贵" 的典故。',
                ['陆机《文赋》', '左思《三都赋》', '潘岳《悼亡诗》', '谢灵运《登池上楼》']
            ),
            q('choice',
                '被尊为 "山水诗鼻祖" 的诗人是？',
                '谢灵运',
                '谢灵运是第一位大量创作山水诗的文人，扭转玄言诗风气，为盛唐山水田园诗开辟道路，代表作《登池上楼》。',
                ['陶渊明', '谢灵运', '鲍照', '王维']
            ),
            q('choice',
                '提出 "诗缘情而绮靡" 这一核心观点的文论作品是？',
                '陆机《文赋》',
                '陆机在《文赋》中提出 "诗缘情而绮靡"，确立了诗歌的抒情本质与审美属性，是中国文论史上的重要里程碑。',
                ['曹丕《典论·论文》', '陆机《文赋》', '刘勰《文心雕龙》', '钟嵘《诗品》']
            ),
            q('choice',
                '"左思风力" 这一评价出自哪部著作？',
                '钟嵘《诗品》',
                '钟嵘在《诗品》中评价左思诗歌 "左思风力"，指其继承建安风骨，笔力雄健，批判门阀制度，与太康繁柔雕琢的主流诗风形成对立。',
                ['刘勰《文心雕龙》', '钟嵘《诗品》', '陆机《文赋》', '曹丕《典论·论文》']
            ),
            q('choice',
                '玄言诗的主要弊端被概括为？',
                '理过其辞，淡乎寡味',
                '玄言诗核心阐释老庄、佛家玄理，山水景物仅作为体悟玄道的工具，导致 "理过其辞，淡乎寡味"，文学审美性薄弱。',
                ['采缛于正始，力柔于建安', '理过其辞，淡乎寡味', '错采镂金，雕琢过甚', '情景割裂，玄言尾巴']
            ),
            q('choice',
                '鲍照对七言诗发展的革新贡献是？',
                '隔句押韵、自由换韵',
                '鲍照改造七言乐府，打破句句押韵的旧制，改为隔句押韵、自由换韵，极大解放了七言诗的表现力，深刻影响李白七言歌行。',
                ['句句押韵，一韵到底', '隔句押韵、自由换韵', '首句入韵，隔句押韵', '平仄交替，对仗工整']
            )
        );

        // 2. 填空题 (12题)
        baseQuestions.push(
            q('fill',
                '曹操《薤露行》：瞻彼洛城郭，______。',
                '微子为哀伤',
                '曹操《薤露行》以 "微子为哀伤" 作结，借微子哀伤殷墟的典故，表达对汉室倾覆的沉痛感慨。'
            ),
            q('fill',
                '曹丕《燕歌行》：秋风萧瑟天气凉，______。',
                '草木摇落露为霜',
                '曹丕《燕歌行》开篇 "秋风萧瑟天气凉，草木摇落露为霜"，以秋景起兴，烘托思妇怀远的凄清氛围。'
            ),
            q('fill',
                '嵇康《赠秀才入军·其十四》：目送归鸿，______。',
                '手挥五弦',
                '"目送归鸿，手挥五弦" 是嵇康诗中的名句，描绘了超然物外、游心太玄的高逸境界，被誉为 "俯仰自得，游心太玄"。'
            ),
            q('fill',
                '谢灵运《登池上楼》：池塘生春草，______。',
                '园柳变鸣禽',
                '"池塘生春草，园柳变鸣禽" 是谢灵运山水诗的代表名句，以自然之景写初春生机，被后世誉为 "自然天成"。'
            ),
            q('fill',
                '左思《咏史诗·其一》：弱冠弄柔翰，______。',
                '卓荦观群书',
                '左思《咏史诗》开篇 "弱冠弄柔翰，卓荦观群书"，自述年少时便博览群书、才华卓绝，为下文咏怀壮志作铺垫。'
            ),
            q('fill',
                '王粲《七哀诗·其二》：荆蛮非我乡，______。',
                '何为久滞淫',
                '王粲《七哀诗》以 "荆蛮非我乡，何为久滞淫" 开篇，直抒羁旅漂泊之苦，表达对故乡的深切思念。'
            ),
            q('fill',
                '阮籍《咏怀诗·其三》：嘉树下成蹊，______。',
                '东园桃与李',
                '阮籍《咏怀诗》以 "嘉树下成蹊，东园桃与李" 起兴，借桃李盛衰隐喻人生荣枯，寄托忧生之叹。'
            ),
            q('fill',
                '陆机《赴洛道中作·其二》：夕息抱影寐，______。',
                '朝徂衔思往',
                '陆机《赴洛道中作》以 "夕息抱影寐，朝徂衔思往" 写羁旅孤寂，朝夕之间形影相吊，忧思难遣。'
            ),
            q('fill',
                '建安风骨的核心风格特点是 ______ 和 ______。',
                '慷慨悲凉、刚健有力',
                '建安风骨内涵包括内容上直面战乱、书写民生疾苦与建功立业理想；风格上慷慨悲凉、刚健有力，梗概多气。'
            ),
            q('fill',
                '谢灵运山水诗惯用的固定结构是 ______ + ______ + ______。',
                '纪游、写景、言理',
                '谢灵运山水诗形成了 "纪游 — 写景 — 言理" 的三段式结构，先叙出游，再细致描摹山水，结尾附玄理感悟。'
            ),
            q('fill',
                '鲍照的代表作《______》集中抒发了寒门士子被压抑的悲愤。',
                '拟行路难',
                '鲍照《拟行路难》是寒士文学的代表作，控诉门阀制度对寒门士子的压迫，抒发壮志难酬的悲愤，诗风雄肆奔放。'
            ),
            q('fill',
                '"诗缘情而绮靡" 出自 ______ 的《______》。',
                '陆机、文赋',
                '陆机《文赋》提出 "诗缘情而绮靡"，强调诗歌的抒情本质与审美属性，是中国文论史上的核心命题。'
            )
        );

        // 3. 背诵题 (5题) — 根据最新文档更新全文
        const reciteData = [
            { 
                title: '曹操《薤露行》', 
                text: '惟汉廿二世，所任诚不良。\n沐猴而冠带，知小而谋强。\n犹豫不敢断，因狩执君王。\n白虹为贯日，己亦先受殃。\n贼臣持国柄，杀主灭宇京。\n荡覆帝基业，宗庙以燔丧。\n播越西迁移，号泣而且行。\n瞻彼洛城郭，微子为哀伤。' 
            },
            { 
                title: '曹丕《燕歌行·其一》', 
                text: '秋风萧瑟天气凉，草木摇落露为霜，群燕辞归雁南翔，\n念君客游思断肠。慊慊思归恋故乡，何为淹留寄佗方？\n贱妾茕茕守空房，忧来思君不敢忘，不觉泪下沾衣裳。\n援琴鸣弦发清商，短歌微吟不能长。\n明月皎皎照我床，星汉西流夜未央。\n牵牛织女遥相望，尔独何辜限河梁？' 
            },
            { 
                title: '王粲《七哀诗·其二》', 
                text: '荆蛮非我乡，何为久滞淫？方舟溯大江，\n日暮愁我心。山冈有余映，岩阿增重阴。\n狐狸驰赴穴，飞鸟翔故林。流波激清响，\n猴猿临岸吟。迅风拂裳袂，白露沾衣襟。\n独夜不能寐，摄衣起抚琴。丝桐感人情，\n为我发悲音。羁旅无终极，忧思壮难任。' 
            },
            { 
                title: '阮籍《咏怀诗·其三》', 
                text: '嘉树下成蹊，东园桃与李。\n秋风吹飞藿，零落从此始。\n繁华有憔悴，堂上生荆杞。\n驱马舍之去，去上西山趾。\n一身不自保，何况恋妻子。\n凝霜被野草，岁暮亦云已。' 
            },
            { 
                title: '嵇康《赠秀才入军·其十四》', 
                text: '息徒兰圃，秣马华山。\n流磻平皋，垂纶长川。\n目送归鸿，手挥五弦。\n俯仰自得，游心太玄。\n嘉彼钓叟，得鱼忘筌。\n郢人逝矣，谁与尽言？' 
            }
        ];

        reciteData.forEach(item => {
            baseQuestions.push(
                q('recite',
                    `请默写 ${item.title} 全诗。`,
                    item.text,
                    `《${item.title}》全诗如上。请对照检查默写内容。`,
                    null,
                    { title: item.title }
                )
            );
        });

        // 4. 简答题 (6题)
        baseQuestions.push(
            q('short',
                '简述 "建安风骨" 的内涵。',
                '内容层面：直面汉末战乱，书写民生疾苦、文人建功立业的理想抱负。\n风格层面：慷慨悲凉，刚健有力，志深笔长，梗概多气。',
                '建安风骨是建安文学的核心风格，既包含对现实苦难的深切关注，又洋溢着积极进取的豪迈气概，形成 "慷慨悲凉、刚健有力" 的独特风貌。'
            ),
            q('short',
                '简述谢灵运山水诗的艺术特色。',
                '① 固定三段式结构：纪行出游 — 细致写景 — 结尾悟玄说理。\n② 写景精工细腻，描摹山水声色形态，辞藻富艳，追求景物形似。\n③ 首创将山水作为独立审美对象，摆脱玄言诗说理工具的定位。\n④ 缺陷：结尾多附老庄玄理，山水与情感未能完全交融。',
                '谢灵运是山水诗鼻祖，其诗以精工摹写自然景物著称，开创了山水诗独立审美传统，但结尾常带 "玄言尾巴"，情景略有割裂。'
            ),
            q('short',
                '简述左思《咏史诗》的创新与 "左思风力"。',
                '① 题材革新：改变前代单纯咏古模式，借古人事迹抒发自身现实苦闷，以史咏怀。\n② 思想内核：尖锐批判门阀士族垄断仕途的现实，抒发寒门志士不平。\n③ 风格特色：笔力雄健慷慨，继承建安风骨，脱离西晋繁缛雕琢的文风。\n④ 表现手法：善用鲜明对比，语言质朴无华，气势充沛。',
                '左思《咏史诗》开创 "以史咏怀" 的新范式，其 "左思风力" 被钟嵘《诗品》盛赞，以雄健笔力批判门阀制度，在建安风骨与盛唐气象之间架起桥梁。'
            ),
            q('short',
                '简述鲍照诗歌的文学史贡献。',
                '① 体制革新：改造七言乐府押韵规则，隔句押韵、自由换韵，拓展七言诗发展空间。\n② 主题开拓：集中书写寒士被压抑的悲愤，创立寒士文学核心题材。\n③ 风格传承：俊逸豪放的诗风直接影响李白，为盛唐七言歌行奠定基础。',
                '鲍照以寒士身份登上诗坛，其七言乐府的革新和雄肆奔放的诗风，成为连接建安风骨与盛唐气象的重要桥梁，对李白影响尤深。'
            ),
            q('short',
                '简述玄言诗的兴衰过程。',
                '① 兴盛背景：东晋玄学清谈盛行，文人以老庄、佛理入诗。\n② 核心弊端：重哲理轻文采，淡乎寡味，山水仅为说理载体。\n③ 衰落：谢灵运大量创作山水诗，山水成为独立审美主体，玄言诗退出主流。',
                '玄言诗是东晋特定思想环境下的产物，虽在哲理探索上有其价值，但文学审美性薄弱，最终被新兴的山水诗所取代。'
            ),
            q('short',
                '简述阮籍《咏怀诗》的艺术特色与后世影响。',
                '① 抒情方式：以比兴、象征、神话隐晦抒情，规避政治迫害，暗含讽世之意。\n② 核心主题：朝代盛衰感慨、生死忧思、出仕与归隐的内心矛盾。\n③ 体例开创：创立五言咏怀组诗范式，后世《感遇》《古风》系列诗作全部承袭此体。',
                '阮籍《咏怀诗》以隐晦幽深的艺术手法，抒写了正始时期士人的忧生之嗟和避祸心态，其组诗范式深刻影响了陈子昂、李白、张九龄等后世诗人。'
            )
        );

        // ============================================================
        //  洗 牌 工 具
        // ============================================================
        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // 当前题目数组 (可被洗牌)
        let questions = [];

        // ============================================================
        //  应 用 状 态
        // ============================================================
        let currentIndex = 0;
        const total = baseQuestions.length;

        // DOM 引用
        const qBadge = document.getElementById('qBadge');
        const qText = document.getElementById('qText');
        const qInteraction = document.getElementById('qInteraction');
        const answerBox = document.getElementById('answerBox');
        const ansContent = document.getElementById('ansContent');
        const progress = document.getElementById('progress');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const favBtn = document.getElementById('favBtn');
        const answerBtn = document.getElementById('answerBtn');
        const favStats = document.getElementById('favStats');
        const shuffleBtn = document.getElementById('shuffleBtn');
        const backBtn = document.getElementById('backBtn');

        // ============================================================
        //  渲 染 函 数
        // ============================================================
        function render() {
            const q = questions[currentIndex];
            if (!q) return;

            // 更新进度
            progress.textContent = `${currentIndex + 1} / ${total}`;

            // 更新徽章
            const typeMap = {
                choice: '选择题',
                fill: '填空题',
                recite: '背诵题',
                short: '简答题'
            };
            qBadge.textContent = typeMap[q.type] || '题目';
            qBadge.className = 'q-badge type-' + q.type;

            // 题目文本
            qText.innerHTML = q.question;

            // 交互区
            qInteraction.innerHTML = '';
            answerBox.classList.remove('show');
            answerBtn.textContent = '📋 显示答案';
            answerBtn.className = 'btn btn-answer';

            // ---- 选择题 ----
            if (q.type === 'choice' && q.options) {
                const div = document.createElement('div');
                div.className = 'options';
                const letters = ['A', 'B', 'C', 'D'];
                q.options.forEach((opt, idx) => {
                    const label = document.createElement('label');
                    label.className = 'option';
                    label.innerHTML = `
                        <span class="letter">${letters[idx]}.</span>
                        <span>${opt}</span>
                        <input type="radio" name="choice" value="${idx}" />
                    `;
                    label.addEventListener('click', () => {
                        // 清除同组其他选中
                        div.querySelectorAll('.option').forEach(el => el.classList.remove('selected'));
                        label.classList.add('selected');
                        label.querySelector('input[type="radio"]').checked = true;
                    });
                    div.appendChild(label);
                });
                qInteraction.appendChild(div);
            }

            // ---- 填空题 ----
            if (q.type === 'fill') {
                const div = document.createElement('div');
                div.className = 'input-area';
                const input = document.createElement('input');
                input.type = 'text';
                input.placeholder = '请填写答案…';
                input.id = 'fillInput';
                div.appendChild(input);
                qInteraction.appendChild(div);
            }

            // ---- 背诵题 ----
            if (q.type === 'recite') {
                const div = document.createElement('div');
                div.className = 'input-area';
                const textarea = document.createElement('textarea');
                textarea.placeholder = '请在此默写全诗…';
                textarea.id = 'reciteInput';
                div.appendChild(textarea);
                const hint = document.createElement('div');
                hint.className = 'hint-text';
                hint.textContent = '💡 尽量完整默写，完成后点击「显示答案」对照原诗。';
                div.appendChild(hint);
                qInteraction.appendChild(div);
            }

            // ---- 简答题 ----
            if (q.type === 'short') {
                const div = document.createElement('div');
                div.className = 'input-area';
                const textarea = document.createElement('textarea');
                textarea.placeholder = '请简述你的答案…';
                textarea.id = 'shortInput';
                div.appendChild(textarea);
                const hint = document.createElement('div');
                hint.className = 'hint-text';
                hint.textContent = '💡 建议分点作答，点击「显示答案」查看要点。';
                div.appendChild(hint);
                qInteraction.appendChild(div);
            }

            // 更新按钮状态
            prevBtn.disabled = currentIndex === 0;
            nextBtn.disabled = currentIndex === total - 1;

            // 收藏状态
            updateFavButton();

            // 更新收藏统计
            updateFavStats();
        }

        // ============================================================
        //  收 藏
        // ============================================================
        function updateFavButton() {
            const q = questions[currentIndex];
            if (q.fav) {
                favBtn.textContent = '★ 已收藏';
                favBtn.classList.add('active');
            } else {
                favBtn.textContent = '☆ 收藏';
                favBtn.classList.remove('active');
            }
        }

        function updateFavStats() {
            const count = questions.filter(q => q.fav).length;
            favStats.textContent = `已收藏 ${count} 题`;
        }

        function toggleFav() {
            const q = questions[currentIndex];
            q.fav = !q.fav;
            updateFavButton();
            updateFavStats();
        }

        // ============================================================
        //  显 示 答 案
        // ============================================================
        function toggleAnswer() {
            const q = questions[currentIndex];
            const box = answerBox;
            const content = ansContent;

            if (box.classList.contains('show')) {
                box.classList.remove('show');
                answerBtn.textContent = '📋 显示答案';
                answerBtn.className = 'btn btn-answer';
                return;
            }

            let html = '';
            if (q.type === 'choice') {
                html = `<strong>正确答案：</strong> ${q.answer}`;
            } else if (q.type === 'fill') {
                html = `<strong>正确答案：</strong> ${q.answer}`;
            } else if (q.type === 'recite') {
                html = `<strong>原诗：</strong><br>${q.answer.replace(/\n/g, '<br>')}`;
            } else if (q.type === 'short') {
                html = `<strong>答题要点：</strong><br>${q.answer.replace(/\n/g, '<br>')}`;
            }

            if (q.explanation) {
                html += `<div class="explain"><strong>📖 解析：</strong> ${q.explanation}</div>`;
            }

            content.innerHTML = html;
            box.classList.add('show');
            answerBtn.textContent = '🔒 收起答案';
            answerBtn.className = 'btn btn-answer showing';
        }

        // ============================================================
        //  导 航
        // ============================================================
        function goTo(index) {
            if (index < 0 || index >= total) return;
            currentIndex = index;
            render();
            document.getElementById('questionCard').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function prev() {
            if (currentIndex > 0) goTo(currentIndex - 1);
        }

        function next() {
            if (currentIndex < total - 1) goTo(currentIndex + 1);
        }

        // ============================================================
        //  随 机 洗 牌
        // ============================================================
        function shuffleQuestions() {
            shuffleArray(questions);
            currentIndex = 0;
            render();
        }

        // ============================================================
        //  返 回 主 页
        // ============================================================
        function goHome() {
            window.location.href = 'index.html';
        }

        // ============================================================
        //  键 盘 事 件
        // ============================================================
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') prev();
            if (e.key === 'ArrowRight') next();
            if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
                e.preventDefault();
                toggleAnswer();
            }
        });

        // ============================================================
        //  事 件 绑 定
        // ============================================================
        prevBtn.addEventListener('click', prev);
        nextBtn.addEventListener('click', next);
        favBtn.addEventListener('click', toggleFav);
        answerBtn.addEventListener('click', toggleAnswer);
        shuffleBtn.addEventListener('click', shuffleQuestions);
        backBtn.addEventListener('click', goHome);

        // ============================================================
        //  初 始 化
        // ============================================================
        questions = baseQuestions.map(item => ({ ...item, fav: false }));
        shuffleArray(questions);
        currentIndex = 0;
        render();
    </script>

</body>
</html>
